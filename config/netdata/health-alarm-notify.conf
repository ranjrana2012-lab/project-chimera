# Netdata Health Alarm Notification Configuration
# Project Chimera - Slack Integration

# =============================================================================
# Slack Notification Settings
# =============================================================================

# Slack webhook URL (set via environment variable in docker-compose.yml)
# Default: empty (notifications disabled)
SEND_SLACK="YES"
SLACK_WEBHOOK_URL="${SLACK_WEBHOOK_URL}"

# Default Slack channel for notifications
DEFAULT_RECIPIENT_SLACK="${SLACK_CHANNEL:-#chimera-alerts}"

# =============================================================================
# Alarm Role to Slack Channel Mapping
# =============================================================================

# Critical alerts go to critical channel
role_recipients_slack[syslog critical]="${SLACK_CRITICAL_CHANNEL:-#chimera-critical}"
role_recipients_slack[system critical]="${SLACK_CRITICAL_CHANNEL:-#chimera-critical}"

# Warning and error alerts go to default alerts channel
role_recipients_slack[syslog warning]="${SLACK_CHANNEL:-#chimera-alerts}"
role_recipients_slack[syslog error]="${SLACK_CHANNEL:-#chimera-alerts}"
role_recipients_slack[system warning]="${SLACK_CHANNEL:-#chimera-alerts}"
role_recipients_slack[system error]="${SLACK_CHANNEL:-#chimera-alerts}"

# =============================================================================
# Notification Timing and Throttling
# =============================================================================

# Delay before sending the first notification (in seconds)
# This prevents alert spam during brief fluctuations
DEFAULT_RECIPIENT_DELAY_NORMAL="${NORMAL_NOTIFICATION_DELAY:-60}"

# Delay for critical alerts (send immediately)
role_recipient_delay[critical]="${CRITICAL_NOTIFICATION_DELAY:-10}"

# Maximum number of notifications per alarm per hour
# Prevents notification spam
MAX_SENDER_NOTIFICATIONS_PER_HOUR="${MAX_NOTIFICATIONS_PER_HOUR:-10}"

# =============================================================================
# Notification Formatting
# =============================================================================

# Include detailed information in notifications
DEFAULT_RECIPIENT_DETAILS_YES="YES"

# Include link to Netdata dashboard in notifications
DEFAULT_RECIPIENT_LINK_YES="YES"

# =============================================================================
# Alert Severity Colors (Slack formatting)
# =============================================================================

# Critical alerts - red
# Warning alerts - yellow
# Info alerts - green

# =============================================================================
# Custom Alert Messages
# =============================================================================

# When an alarm is cleared
DEFAULT_MSG_CLEAR="Project Chimera alarm **${alert_name}** on **${host}** has been cleared\n\nValue: ${value}\nStatus: Normal"

# When an alarm is raised
DEFAULT_MSG_ALARM="Project Chimera alarm **${alert_name}** on **${host}**\n\nSeverity: ${status}\nValue: ${value}\nThreshold: ${threshold}\nDuration: ${duration}\n\nChart: ${chart}\nFamily: ${family}"

# =============================================================================
# Specific Alert Overrides
# =============================================================================

# Disable redundant alerts that Prometheus/AlertManager already handles
# Netdata excels at infrastructure health, not application metrics

# Disable CPU usage alerts (Prometheus handles service CPU)
role_recipients_slack[cpu usage]="${DISABLE_RECURRENT_ALERTS:-NO}"

# Disable memory alerts (Prometheus handles service memory)
role_recipients_slash[ram usage]="${DISABLE_RECURRENT_ALERTS:-NO}"

# Keep infrastructure health alerts enabled
# - Disk I/O saturation (not monitored by Prometheus)
# - Network errors and drops (not monitored by Prometheus)
# - Process-level issues (not monitored by Prometheus)
# - GPU monitoring (not monitored by Prometheus)
# - Container health issues (not monitored by Prometheus)

# =============================================================================
# Notification Refresh Settings
# =============================================================================

# How often to repeat notifications for ongoing alarms
# Set to 0 to only notify once per alarm
DEFAULT_REPEAT_YES="YES"

# Send follow-up notifications every X minutes for ongoing alarms
role_recipient_repeat[critical]="${CRITICAL_REPEAT_INTERVAL:-10}"
role_recipient_repeat[warning]="${WARNING_REPEAT_INTERVAL:-30}"
role_recipient_repeat[error]="${ERROR_REPEAT_INTERVAL:-30}"

# =============================================================================
# Additional Settings
# =============================================================================

# Enable/disable notifications during specific time periods
# (e.g., maintenance windows)
# ENABLED_DURING="* * * * *"  # Always enabled
# ENABLED_DURING="* 9-17 * * 1-5"  # Business hours, Monday-Friday

# Quiet mode - suppress info/debug notifications
# YES = only send critical/warning/error
# NO = send all notifications
QUEET_MODE="YES"
