apiVersion: v1
kind: ConfigMap
metadata:
  name: bsl-agent-config
  namespace: project-chimera
  labels:
    app: bsl-agent
    component: service
data:
  SERVICE_NAME: "bsl-agent"
  PORT: "8003"
  LOG_LEVEL: "INFO"
  ENVIRONMENT: "production"
  DEVICE: "cuda"
  DEFAULT_MODEL: "bsl-gan-large"
  MAX_VRAM_MB: "8192"
  MODEL_OFFLOAD: "true"
  MAX_VIDEO_LENGTH: "300"
  FRAME_RATE: "25"
  OUTPUT_RESOLUTION: "512x512"
  OUTPUT_FORMAT: "mp4"
  VIDEO_BITRATE: "2000k"
  TORCH_THREADS: "4"
---
apiVersion: v1
kind: Service
metadata:
  name: bsl-agent
  namespace: project-chimera
  labels:
    app: bsl-agent
    component: service
spec:
  type: ClusterIP
  ports:
  - port: 8003
    targetPort: 8003
    protocol: TCP
    name: http
  selector:
    app: bsl-agent
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bsl-agent-models
  namespace: project-chimera
  labels:
    app: bsl-agent
    component: storage
spec:
  accessModes:
  - ReadWriteMany
  resources:
    requests:
      storage: 25Gi
  storageClassName: nfs-sc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bsl-agent
  namespace: project-chimera
  labels:
    app: bsl-agent
    component: service
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: bsl-agent
  template:
    metadata:
      labels:
        app: bsl-agent
        component: service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8003"
        prometheus.io/path: "/metrics"
    spec:
      hostNetwork: false
      hostPID: false
      hostIPC: false
      dnsPolicy: ClusterFirst
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: bsl-agent
        image: ghcr.io/project-chimera/bsl-agent:latest
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false
        ports:
        - containerPort: 8003
          protocol: TCP
          name: http
        envFrom:
        - configMapRef:
            name: bsl-agent-config
        env:
        - name: MODEL_PATH
          value: "/models/bsl-gan"
        - name: HUGGINGFACE_CACHE_DIR
          value: "/models/cache"
        - name: OTLP_ENDPOINT
          value: "http://opentelemetry-collector.observability.svc.cluster.local:4317"
        resources:
          requests:
            cpu: "2000m"
            memory: "4Gi"
            nvidia.com/gpu: "1"
          limits:
            cpu: "8000m"
            memory: "16Gi"
            nvidia.com/gpu: "1"
        volumeMounts:
        - name: models
          mountPath: /models
        - name: tmp
          mountPath: /tmp
        - name: video-output
          mountPath: /output
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8003
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8003
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health/live
            port: 8003
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30
      volumes:
      - name: models
        persistentVolumeClaim:
          claimName: bsl-agent-models
      - name: tmp
        emptyDir:
          sizeLimit: 5Gi
      - name: video-output
        emptyDir:
          sizeLimit: 10Gi
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - NVIDIA_GB10
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - bsl-agent
              topologyKey: kubernetes.io/hostname
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bsl-agent
  namespace: project-chimera
  labels:
    app: bsl-agent
    component: service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bsl-agent
  minReplicas: 1
  maxReplicas: 2
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 1
        periodSeconds: 30
      selectPolicy: Max
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: bsl-agent
  namespace: project-chimera
  labels:
    app: bsl-agent
    component: service
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: bsl-agent
