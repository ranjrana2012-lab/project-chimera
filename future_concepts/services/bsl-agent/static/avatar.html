<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSL Avatar Viewer - Project Chimera</title>
    <link rel="stylesheet" href="/static/css/avatar.css">
</head>
<body>
    <div class="avatar-container">
        <header class="avatar-header">
            <h1>BSL Avatar Viewer</h1>
            <div class="status-indicator" id="statusIndicator">
                <span class="status-dot"></span>
                <span class="status-text">Loading...</span>
            </div>
        </header>

        <main class="avatar-main">
            <div class="canvas-container" id="canvasContainer">
                <canvas id="avatarCanvas"></canvas>
                <div class="loading-overlay" id="loadingOverlay">
                    <div class="spinner"></div>
                    <p>Loading Avatar...</p>
                </div>
            </div>

            <aside class="controls-panel">
                <div class="control-section">
                    <h3>Animation Controls</h3>
                    <div class="button-group">
                        <button id="playBtn" class="btn btn-primary" disabled>
                            <svg width="16" height="16" viewBox="0 0 16 16">
                                <path d="M4 4l8 4-8 4V4z"/>
                            </svg>
                            Play
                        </button>
                        <button id="pauseBtn" class="btn btn-secondary" disabled>
                            <svg width="16" height="16" viewBox="0 0 16 16">
                                <path d="M4 4h3v8H4V4zm5 0h3v8H9V4z"/>
                            </svg>
                            Pause
                        </button>
                        <button id="stopBtn" class="btn btn-secondary" disabled>
                            <svg width="16" height="16" viewBox="0 0 16 16">
                                <path d="M4 4h8v8H4V4z"/>
                            </svg>
                            Stop
                        </button>
                    </div>
                </div>

                <div class="control-section">
                    <h3>Playback Speed</h3>
                    <div class="speed-control">
                        <button class="speed-btn" data-speed="0.5">0.5x</button>
                        <button class="speed-btn active" data-speed="1.0">1x</button>
                        <button class="speed-btn" data-speed="1.5">1.5x</button>
                        <button class="speed-btn" data-speed="2.0">2x</button>
                    </div>
                </div>

                <div class="control-section">
                    <h3>Facial Expressions</h3>
                    <div class="expression-grid">
                        <button class="expression-btn" data-expression="neutral">Neutral</button>
                        <button class="expression-btn" data-expression="happy">Happy</button>
                        <button class="expression-btn" data-expression="sad">Sad</button>
                        <button class="expression-btn" data-expression="surprised">Surprised</button>
                        <button class="expression-btn" data-expression="brows-up">Brows Up</button>
                        <button class="expression-btn" data-expression="brows-down">Brows Down</button>
                    </div>
                </div>

                <div class="control-section">
                    <h3>Hand Shapes</h3>
                    <div class="handshape-grid">
                        <button class="handshape-btn" data-hand="right" data-shape="fist">Fist</button>
                        <button class="handshape-btn" data-hand="right" data-shape="open">Open</button>
                        <button class="handshape-btn" data-hand="right" data-shape="point">Point</button>
                        <button class="handshape-btn" data-hand="right" data-shape="peace">Peace</button>
                    </div>
                </div>

                <div class="control-section">
                    <h3>Sign Translation</h3>
                    <div class="translation-input">
                        <input
                            type="text"
                            id="glossInput"
                            placeholder="Enter BSL gloss (e.g., 'HELLO HOW YOU')"
                        >
                        <button id="translateBtn" class="btn btn-primary">Sign</button>
                    </div>
                </div>

                <div class="control-section">
                    <h3>Timeline</h3>
                    <div class="timeline-container">
                        <div class="timeline-bar" id="timelineBar">
                            <div class="timeline-progress" id="timelineProgress"></div>
                        </div>
                        <div class="time-display">
                            <span id="currentTime">0:00</span>
                            <span id="totalTime">0:00</span>
                        </div>
                    </div>
                </div>

                <div class="control-section">
                    <h3>Debug Info</h3>
                    <div class="debug-info" id="debugInfo">
                        <div class="debug-row">
                            <span class="debug-label">FPS:</span>
                            <span class="debug-value" id="fpsDisplay">0</span>
                        </div>
                        <div class="debug-row">
                            <span class="debug-label">Animation:</span>
                            <span class="debug-value" id="animationDisplay">None</span>
                        </div>
                        <div class="debug-row">
                            <span class="debug-label">Expression:</span>
                            <span class="debug-value" id="expressionDisplay">Neutral</span>
                        </div>
                    </div>
                </div>
            </aside>
        </main>

        <footer class="avatar-footer">
            <p>BSL Avatar Viewer | Project Chimera | Powered by Three.js</p>
        </footer>
    </div>

    <!-- Three.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- GLTFLoader from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <!-- Application Scripts -->
    <script src="/static/js/avatar.js"></script>
    <script src="/static/js/nmm-loader.js"></script>
    <script src="/static/js/animation-controller.js"></script>
</body>
</html>
