metadata:
  title: "Adaptive Performance"
  author: "Project Chimera"
  version: "1.0"
  description: "Demonstrates audience-responsive show adaptations"
  estimated_duration_ms: 45000
  tags:
    - demo
    - adaptive
    - sentiment

  # Safety settings
  require_human_approval: true
  emergency_stop_enabled: true
  max_scene_duration_ms: 300000

  # Audience adaptation enabled
  enable_sentiment_adaptation: true
  sentiment_check_interval_ms: 3000

scenes:
  - id: "scene_1_opening"
    title: "Opening Scene"
    description: "Set the stage and check audience mood"
    duration_ms: 12000

    actions:
      # Set mysterious lighting
      - agent: "lighting"
        action: "set_lighting"
        description: "Create mysterious atmosphere"
        parameters:
          scene: "mysterious"
          mood: "mysterious"
        timeout_ms: 3000
        continue_on_failure: true

      # Generate opening dialogue
      - agent: "scenespeak"
        action: "generate_dialogue"
        description: "Opening monologue"
        parameters:
          prompt: "Welcome to a unique theatrical experience. Tonight, our performance will adapt based on your reactions and emotions. Let's begin..."
          context:
            show_id: "adaptive_show"
            scene_number: 1
            tone: "mysterious"
          max_tokens: 120
          temperature: 0.8
        timeout_ms: 5000

      # Check audience sentiment
      - agent: "sentiment"
        action: "analyze_sentiment"
        description: "Analyze initial audience mood"
        parameters:
          text: "audience_initial_reaction"
        timeout_ms: 2000
        continue_on_failure: true

      # Wait for delivery
      - action: "wait"
        duration_ms: 4000
        description: "Pause for opening delivery"

    adapt_to_sentiment: true
    sentiment_thresholds:
      positive: 0.6
      negative: 0.4

    transition:
      type: "fade"
      duration_ms: 2000

  - id: "scene_2_branching"
    title: "Branching Narrative"
    description: "Different content based on audience sentiment"
    duration_ms: 15000

    actions:
      # Conditional action based on sentiment
      - action: "conditional"
        description: "Choose content based on audience mood"
        condition:
          type: "sentiment"
          operator: ">"
          threshold: 0.6
        then_actions:
          # Positive sentiment path - uplifting
          - agent: "lighting"
            action: "set_lighting"
            description: "Bright, joyful lighting"
            parameters:
              scene: "joyful"
              mood: "joyful"
            timeout_ms: 3000
            continue_on_failure: true

          - agent: "scenespeak"
            action: "generate_dialogue"
            description: "Uplifting content"
            parameters:
              prompt: "We sense your excitement! Let's continue this joyful journey together with an uplifting tale of hope and wonder."
              context:
                show_id: "adaptive_show"
                scene_number: 2
                path: "positive"
              max_tokens: 100
              temperature: 0.9
            timeout_ms: 5000

        else_actions:
          # Lower sentiment path - dramatic
          - agent: "lighting"
            action: "set_lighting"
            description: "Dramatic, intense lighting"
            parameters:
              scene: "dramatic"
              mood: "dramatic"
            timeout_ms: 3000
            continue_on_failure: true

          - agent: "scenespeak"
            action: "generate_dialogue"
            description: "Dramatic content"
            parameters:
              prompt: "We sense a more contemplative mood. Let's explore a deeper, more dramatic narrative that resonates with your emotions."
              context:
                show_id: "adaptive_show"
                scene_number: 2
                path: "dramatic"
              max_tokens: 100
              temperature: 0.6
            timeout_ms: 5000

      # Start accessibility in parallel
      - action: "parallel"
        description: "Launch accessibility features"
        wait_for_all: false
        actions:
          - agent: "captioning"
            action: "transcribe"
            description: "Start captioning"
            parameters:
              audio: "base64_sample_audio"
              language: "en"
            timeout_ms: 3000
            continue_on_failure: true

          - agent: "bsl"
            action: "translate"
            description: "BSL translation"
            parameters:
              text: "${dialogue_text}"
              language: "en"
            timeout_ms: 3000
            continue_on_failure: true

      # Wait for delivery
      - action: "wait"
        duration_ms: 6000
        description: "Pause for content delivery"

    adapt_to_sentiment: true
    sentiment_thresholds:
      positive: 0.65
      negative: 0.35

    transition:
      type: "dissolve"
      duration_ms: 3000

  - id: "scene_3_closing"
    title: "Adaptive Closing"
    description: "Closing that adapts to overall audience sentiment"
    duration_ms: 12000

    actions:
      # Final sentiment check
      - agent: "sentiment"
        action: "analyze_sentiment"
        description: "Final audience mood check"
        parameters:
          text: "audience_final_reaction"
        timeout_ms: 2000
        continue_on_failure: true

      # Conditional closing based on journey
      - action: "conditional"
        description: "Choose closing based on overall sentiment"
        condition:
          type: "sentiment"
          operator: ">"
          threshold: 0.6
        then_actions:
          # Positive closing
          - agent: "lighting"
            action: "set_lighting"
            description: "Warm, positive lighting"
            parameters:
              scene: "warm"
              mood: "joyful"
            timeout_ms: 3000
            continue_on_failure: true

          - agent: "scenespeak"
            action: "generate_dialogue"
            description: "Positive closing message"
            parameters:
              prompt: "Thank you for sharing this wonderful experience with us! Your positive energy has made this performance truly special. Until we meet again!"
              context:
                show_id: "adaptive_show"
                scene_number: 3
                closing: "positive"
              max_tokens: 100
              temperature: 0.9
            timeout_ms: 5000

        else_actions:
          # Reflective closing
          - agent: "lighting"
            action: "set_lighting"
            description: "Contemplative lighting"
            parameters:
              scene: "calm"
              mood: "calm"
            timeout_ms: 3000
            continue_on_failure: true

          - agent: "scenespeak"
            action: "generate_dialogue"
            description: "Reflective closing message"
            parameters:
              prompt: "Thank you for joining us on this journey. We hope this experience gave you moments to reflect and feel. Art connects us all."
              context:
                show_id: "adaptive_show"
                scene_number: 3
                closing: "reflective"
              max_tokens: 100
              temperature: 0.5
            timeout_ms: 5000

      # Final pause
      - action: "wait"
        duration_ms: 4000
        description: "Final pause for impact"

    transition:
      type: "fade"
      duration_ms: 2000
      audio_fade: true
