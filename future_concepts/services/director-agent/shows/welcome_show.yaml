metadata:
  title: "Welcome Show"
  author: "Project Chimera"
  version: "1.0"
  description: "A simple welcome show demonstrating multi-agent coordination"
  estimated_duration_ms: 30000
  tags:
    - demo
    - welcome
    - accessibility

  # Safety settings
  require_human_approval: true
  emergency_stop_enabled: true
  max_scene_duration_ms: 300000

  # Audience adaptation
  enable_sentiment_adaptation: false
  sentiment_check_interval_ms: 5000

scenes:
  - id: "scene_1_intro"
    title: "Introduction"
    description: "Welcome the audience and set the mood"
    duration_ms: 10000

    actions:
      # Set calm lighting mood
      - agent: "lighting"
        action: "set_lighting"
        description: "Set calm welcoming lighting"
        parameters:
          scene: "welcome"
          mood: "calm"
        timeout_ms: 3000
        continue_on_failure: true

      # Generate welcome dialogue
      - agent: "scenespeak"
        action: "generate_dialogue"
        description: "Generate welcome message"
        parameters:
          prompt: "Welcome to our show! We're excited to have you here today. This is a demonstration of Project Chimera's automated theatre capabilities."
          context:
            show_id: "welcome_show"
            scene_number: 1
          max_tokens: 100
          temperature: 0.7
        timeout_ms: 5000

      # Wait for dialogue delivery
      - action: "wait"
        duration_ms: 3000
        description: "Pause for dialogue delivery"

    transition:
      type: "fade"
      duration_ms: 1000

  - id: "scene_2_features"
    title: "Feature Demonstration"
    description: "Demonstrate accessibility features"
    duration_ms: 15000

    actions:
      # Set dramatic lighting
      - agent: "lighting"
        action: "set_lighting"
        description: "Switch to dramatic lighting"
        parameters:
          scene: "dramatic"
          mood: "dramatic"
        timeout_ms: 3000
        continue_on_failure: true

      # Start captioning for accessibility
      - action: "parallel"
        description: "Start accessibility features in parallel"
        wait_for_all: true
        actions:
          # Generate dialogue about features
          - agent: "scenespeak"
            action: "generate_dialogue"
            description: "Explain accessibility features"
            parameters:
              prompt: "Our show includes real-time captioning for accessibility, sign language translation via BSL, and adaptive lighting controlled by AI."
              context:
                show_id: "welcome_show"
                scene_number: 2
              max_tokens: 150
              temperature: 0.7
            timeout_ms: 5000

          # Prepare BSL translation
          - agent: "bsl"
            action: "translate"
            description: "Translate to BSL gloss"
            parameters:
              text: "Welcome to our show! We have captioning and sign language support."
              language: "en"
              gloss_format: "singspell"
            timeout_ms: 3000
            continue_on_failure: true

      # Wait for delivery
      - action: "wait"
        duration_ms: 5000
        description: "Pause for feature explanation"

    transition:
      type: "fade"
      duration_ms: 1500

  - id: "scene_3_audience"
    title: "Audience Engagement"
    description: "Engage with audience sentiment"
    duration_ms: 10000

    actions:
      # Set joyful lighting
      - agent: "lighting"
        action: "set_lighting"
        description: "Switch to joyful lighting"
        parameters:
          scene: "joyful"
          mood: "joyful"
        timeout_ms: 3000
        continue_on_failure: true

      # Generate engagement dialogue
      - agent: "scenespeak"
        action: "generate_dialogue"
        description: "Engage with audience"
        parameters:
          prompt: "We're monitoring audience sentiment to adapt our performance in real-time. Thank you for being part of this innovative experience!"
          context:
            show_id: "welcome_show"
            scene_number: 3
          max_tokens: 100
          temperature: 0.8
        timeout_ms: 5000

      # Wait for delivery
      - action: "wait"
        duration_ms: 3000
        description: "Pause for audience engagement"

      # Analyze audience sentiment
      - agent: "sentiment"
        action: "analyze_sentiment"
        description: "Check audience reaction"
        parameters:
          text: "audience_reaction_sample"
        timeout_ms: 2000
        continue_on_failure: true

    transition:
      type: "fade"
      duration_ms: 2000

  - id: "scene_4_closing"
    title: "Closing"
    description: "Thank the audience and end show"
    duration_ms: 8000

    actions:
      # Set calm lighting for closing
      - agent: "lighting"
        action: "set_lighting"
        description: "Return to calm lighting"
        parameters:
          scene: "calm"
          mood: "calm"
        timeout_ms: 3000
        continue_on_failure: true

      # Generate closing dialogue
      - agent: "scenespeak"
        action: "generate_dialogue"
        description: "Thank the audience"
        parameters:
          prompt: "Thank you for joining us! This demonstration of Project Chimera shows how AI can create inclusive, adaptive theatrical experiences. Goodbye!"
          context:
            show_id: "welcome_show"
            scene_number: 4
          max_tokens: 100
          temperature: 0.7
        timeout_ms: 5000

      # Final pause
      - action: "wait"
        duration_ms: 3000
        description: "Final pause before end"

    transition:
      type: "cut"
      duration_ms: 0
