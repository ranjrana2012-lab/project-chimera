# Project Chimera - DGX Spark / GB10 ARM64 override
#
# Use with the MVP stack:
#   docker compose -f docker-compose.mvp.yml -f docker-compose.dgx-spark.yml up -d --build
#
# This profile assumes an NVIDIA DGX Spark / Grace Blackwell host with Docker,
# NVIDIA Container Runtime, and NGC registry access configured.

services:
  openclaw-orchestrator:
    platform: linux/arm64
    environment:
      CHIMERA_RUNTIME_PROFILE: dgx-spark

  scenespeak-agent:
    platform: linux/arm64
    environment:
      CHIMERA_RUNTIME_PROFILE: dgx-spark
      SCENESPEAK_LOCAL_LLM_ENABLED: "${CHIMERA_DGX_LOCAL_LLM_ENABLED:-true}"
      SCENESPEAK_LOCAL_LLM_URL: "${CHIMERA_DGX_LLM_URL:-http://kimi-vllm:8012}"
      SCENESPEAK_LOCAL_LLM_MODEL: "${CHIMERA_DGX_LLM_MODEL:-/model}"
      SCENESPEAK_LLM_TIMEOUT: "${CHIMERA_DGX_LLM_TIMEOUT:-300}"

  sentiment-agent:
    platform: linux/arm64
    build:
      context: .
      dockerfile: services/sentiment-agent/Dockerfile.dgx
      args:
        DGX_PYTORCH_IMAGE: "${CHIMERA_DGX_PYTORCH_IMAGE:-nvcr.io/nvidia/pytorch:25.11-py3}"
    environment:
      CHIMERA_RUNTIME_PROFILE: dgx-spark
      USE_ML_MODEL: "true"
      DEVICE: "auto"
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
      MODEL_CACHE_DIR: "/app/models_cache"
    gpus: all
    volumes:
      - "${CHIMERA_DGX_MODEL_CACHE:-./models/dgx-spark/sentiment}:/app/models_cache"

  safety-filter:
    platform: linux/arm64
    environment:
      CHIMERA_RUNTIME_PROFILE: dgx-spark

  translation-agent:
    platform: linux/arm64
    environment:
      CHIMERA_RUNTIME_PROFILE: dgx-spark

  operator-console:
    platform: linux/arm64
    environment:
      CHIMERA_RUNTIME_PROFILE: dgx-spark

  hardware-bridge:
    platform: linux/arm64
    environment:
      CHIMERA_RUNTIME_PROFILE: dgx-spark

  # Kimi K2.6 Super-Agent Stack
  kimi-vllm:
    platform: linux/arm64
    image: vllm/vllm-openai:latest
    container_name: chimera-kimi-vllm
    command: >
      --model /model
      --gpu-memory-utilization 0.55
      --max-model-len 32768
      --dtype bfloat16
      --quantization bitsandbytes
      --port 8012
      --host 0.0.0.0
    gpus: all
    volumes:
      - ${KIMI_MODEL_CACHE:-./models/kimi}:/model
    environment:
      PYTHONUNBUFFERED: "1"
      VLLM_WORKER_MULTIPROC_METHOD: "spawn"
    ports:
      - "${KIMI_VLLM_HOST_BIND:-127.0.0.1}:${KIMI_VLLM_HOST_PORT:-8012}:8012"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8012/health"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 20m
    networks:
      - chimera-backend

  kimi-super-agent:
    platform: linux/arm64
    build:
      context: .
      dockerfile: services/kimi-super-agent/Dockerfile
    container_name: chimera-kimi-super-agent
    gpus: all
    environment:
      KIMI_VLLM_ENDPOINT: http://kimi-vllm:8012
      KIMI_MODEL_NAME: /model
      CHIMERA_RUNTIME_PROFILE: dgx-spark
      KIMI_GRPC_PORT: 50052
      NEMO_CLAW_GRPC_ENDPOINT: nemoclaw-orchestrator:50051
      KIMI_MAX_TOKENS: "${KIMI_MAX_TOKENS:-64}"
      KIMI_REQUEST_TIMEOUT: "${KIMI_REQUEST_TIMEOUT:-300}"
      KIMI_TEMPERATURE: 0.7
      KIMI_TOP_P: 0.9
    volumes:
      - ./config/kimi-super-agent:/etc/kimi:ro
      - ./logs/kimi:/app/logs
    ports:
      - "${KIMI_GRPC_HOST_BIND:-127.0.0.1}:${KIMI_GRPC_HOST_PORT:-50052}:50052"
    depends_on:
      kimi-vllm:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - chimera-backend

  nemoclaw-orchestrator:
    platform: linux/arm64
    build:
      context: .
      dockerfile: services/nemoclaw-orchestrator/Dockerfile.zai
    container_name: nemoclaw-orchestrator
    environment:
      SERVICE_NAME: nemoclaw-orchestrator
      CHIMERA_RUNTIME_PROFILE: dgx-spark
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: INFO
    networks:
      - chimera-backend
    restart: unless-stopped
    depends_on:
      - redis

  # ============================================
  # MONITORING - DGX GPU ENABLED
  # ============================================
  netdata:
    environment:
      - NETDATA_LIBCAP_ENABLE=1
      - NETDATA_STREAM_ENABLED=false
    volumes:
      - /dev/nvidia0:/dev/nvidia0:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
