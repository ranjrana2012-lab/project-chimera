  # Ralph Loop Infrastructure Services
  # Health Aggregator - Polls all services for health status
  health-aggregator:
    build:
      context: ./services/health-aggregator
      dockerfile: Dockerfile
      args:
        - SERVICE_VERSION=${SERVICE_VERSION:-1.0.0}
    image: chimera/health-aggregator:${SERVICE_VERSION:-1.0.0}
    container_name: chimera-health-aggregator
    ports:
      - "${HEALTH_AGGREGATOR_PORT:-8012}:8012"
    environment:
      - SERVICE_NAME=health-aggregator
      - SERVICE_VERSION=${SERVICE_VERSION:-1.0.0}
      - PORT=${HEALTH_AGGREGATOR_PORT:-8012}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - POLL_INTERVAL=${HEALTH_POLL_INTERVAL:-30}
      - TIMEOUT=${HEALTH_TIMEOUT:-5}
      # Active Services
      - OPENCLAW_ORCHESTRATOR_URL=http://openclaw-orchestrator:8000
      - SCENESPEAK_AGENT_URL=http://scenespeak-agent:8001
      - TRANSLATION_AGENT_URL=http://translation-agent:8002
      - SENTIMENT_AGENT_URL=http://sentiment-agent:8004
      - SAFETY_FILTER_URL=http://safety-filter:8006
      - OPERATOR_CONSOLE_URL=http://operator-console:8007
      # Frozen Services (optional - not currently running)
      - HARDWARE_BRIDGE_URL=http://hardware-bridge:8008
      - ECHO_AGENT_URL=http://echo-agent:8014
    volumes:
      - chimera-health-cache:/app/cache
      # Local Ralph Loop dashboard mounts are private/local and omitted from public compose.
    depends_on:
      openclaw-orchestrator:
        condition: service_healthy
      scenespeak-agent:
        condition: service_healthy
      sentiment-agent:
        condition: service_healthy
      safety-filter:
        condition: service_healthy
      operator-console:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8012/health"]
      interval: ${HEALTH_CHECK_INTERVAL:-30s}
      timeout: ${HEALTH_CHECK_TIMEOUT:-10s}
      retries: ${HEALTH_CHECK_RETRIES:-3}
      start_period: ${HEALTH_CHECK_START_PERIOD:-30s}
    networks:
      - chimera-backend
      - chimera-frontend
    restart: ${RESTART_POLICY:-unless-stopped}
    deploy:
      resources:
        limits:
          cpus: ${HEALTH_AGGREGATOR_CPU_LIMIT:-0.5}
          memory: ${HEALTH_AGGREGATOR_MEMORY_LIMIT:-256M}
        reservations:
          cpus: ${HEALTH_AGGREGATOR_CPU_RESERVATION:-0.1}
          memory: ${HEALTH_AGGREGATOR_MEMORY_RESERVATION:-64M}

  # Dashboard - Health monitoring UI for Ralph Loop
  dashboard:
    build:
      context: ./services/dashboard
      dockerfile: Dockerfile
      args:
        - SERVICE_VERSION=${SERVICE_VERSION:-1.0.0}
    image: chimera/dashboard:${SERVICE_VERSION:-1.0.0}
    container_name: chimera-dashboard
    ports:
      - "${DASHBOARD_PORT:-8013}:8013"
    environment:
      - SERVICE_NAME=dashboard
      - SERVICE_VERSION=${SERVICE_VERSION:-1.0.0}
      - PORT=${DASHBOARD_PORT:-8013}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - HEALTH_AGGREGATOR_URL=${HEALTH_AGGREGATOR_URL:-http://health-aggregator:8012}
      - PROJECT_ROOT=${PROJECT_ROOT:-.}
    volumes:
      - chimera-dashboard-cache:/app/cache
      # Local Ralph Loop dashboard mounts are private/local and omitted from public compose.
      # Mount git history for commit display
      - ./.git:/app/.git:ro
    depends_on:
      health-aggregator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8013/health"]
      interval: ${HEALTH_CHECK_INTERVAL:-30s}
      timeout: ${HEALTH_CHECK_TIMEOUT:-10s}
      retries: ${HEALTH_CHECK_RETRIES:-3}
      start_period: ${HEALTH_CHECK_START_PERIOD:-30s}
    networks:
      - chimera-backend
      - chimera-frontend
    restart: ${RESTART_POLICY:-unless-stopped}
    deploy:
      resources:
        limits:
          cpus: ${DASHBOARD_CPU_LIMIT:-0.5}
          memory: ${DASHBOARD_MEMORY_LIMIT:-256M}
        reservations:
          cpus: ${DASHBOARD_CPU_RESERVATION:-0.1}
          memory: ${DASHBOARD_MEMORY_RESERVATION:-64M}

  # Echo Agent - Simplest agent that echoes back input
  echo-agent:
    build:
      context: ./services/echo-agent
      dockerfile: Dockerfile
      args:
        - SERVICE_VERSION=${SERVICE_VERSION:-1.0.0}
    image: chimera/echo-agent:${SERVICE_VERSION:-1.0.0}
    container_name: chimera-echo-agent
    ports:
      - "${ECHO_AGENT_PORT:-8014}:8014"
    environment:
      - SERVICE_NAME=echo-agent
      - SERVICE_VERSION=${SERVICE_VERSION:-1.0.0}
      - PORT=${ECHO_AGENT_PORT:-8014}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8014/health"]
      interval: ${HEALTH_CHECK_INTERVAL:-30s}
      timeout: ${HEALTH_CHECK_TIMEOUT:-10s}
      retries: ${HEALTH_CHECK_RETRIES:-3}
      start_period: ${HEALTH_CHECK_START_PERIOD:-10s}
    networks:
      - chimera-backend
    restart: ${RESTART_POLICY:-unless-stopped}
    deploy:
      resources:
        limits:
          cpus: ${ECHO_CPU_LIMIT:-0.3}
          memory: ${ECHO_MEMORY_LIMIT:-128M}
        reservations:
          cpus: ${ECHO_CPU_RESERVATION:-0.1}
          memory: ${ECHO_MEMORY_RESERVATION:-32M}

  # Translation Agent - Multi-language translation service
  translation-agent:
    build:
      context: ./services/translation-agent
      dockerfile: Dockerfile
      args:
        - SERVICE_VERSION=${SERVICE_VERSION:-1.0.0}
    image: chimera/translation-agent:${SERVICE_VERSION:-1.0.0}
    container_name: chimera-translation-agent
    ports:
      - "${TRANSLATION_AGENT_PORT:-8009}:8006"
    environment:
      - SERVICE_NAME=translation-agent
      - SERVICE_VERSION=${SERVICE_VERSION:-1.0.0}
      - PORT=8006
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - OTLP_ENDPOINT=${OTLP_ENDPOINT:-http://jaeger:4317}
      - TRANSLATION_AGENT_USE_MOCK=${TRANSLATION_AGENT_USE_MOCK:-true}
      - TRANSLATION_AGENT_CACHE_TTL=${TRANSLATION_AGENT_CACHE_TTL:-3600}
      - TRANSLATION_AGENT_BSL_SERVICE_URL=${TRANSLATION_AGENT_BSL_SERVICE_URL:-http://localhost:8005}
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8006/health').raise_for_status()"]
      interval: ${HEALTH_CHECK_INTERVAL:-30s}
      timeout: ${HEALTH_CHECK_TIMEOUT:-10s}
      retries: ${HEALTH_CHECK_RETRIES:-3}
      start_period: ${HEALTH_CHECK_START_PERIOD:-30s}
    networks:
      - chimera-backend
    restart: ${RESTART_POLICY:-unless-stopped}
    deploy:
      resources:
        limits:
          cpus: ${TRANSLATION_CPU_LIMIT:-1.0}
          memory: ${TRANSLATION_MEMORY_LIMIT:-512M}
        reservations:
          cpus: ${TRANSLATION_CPU_RESERVATION:-0.25}
          memory: ${TRANSLATION_MEMORY_RESERVATION:-128M}

