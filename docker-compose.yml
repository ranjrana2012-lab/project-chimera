      - SENTIMENT_MODEL=${SENTIMENT_MODEL:-default}
      - SENTIMENT_THRESHOLD=${SENTIMENT_THRESHOLD:-0.5}
    volumes:
      - chimera-sentiment-cache:/app/cache
      - chimera-sentiment-models:/app/models_cache
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health/live"]
      interval: ${HEALTH_CHECK_INTERVAL:-30s}
      timeout: ${HEALTH_CHECK_TIMEOUT:-10s}
      retries: ${HEALTH_CHECK_RETRIES:-3}
      start_period: ${HEALTH_CHECK_START_PERIOD:-60s}
    networks:
      - chimera-backend
    restart: ${RESTART_POLICY:-unless-stopped}
    deploy:
      resources:
        limits:
          cpus: ${SENTIMENT_CPU_LIMIT:-1.0}
          memory: ${SENTIMENT_MEMORY_LIMIT:-512M}
        reservations:
