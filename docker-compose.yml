  sentiment-agent:
    build:
      context: .
      dockerfile: services/sentiment-agent/Dockerfile
      args:
        - SERVICE_VERSION=${SERVICE_VERSION:-1.0.0}
    image: chimera/sentiment-agent:${SERVICE_VERSION:-1.0.0}
    container_name: chimera-sentiment
    ports:
      - "${SENTIMENT_AGENT_PORT:-8004}:8004"
    environment:
      - SERVICE_NAME=sentiment-agent
      - SERVICE_VERSION=${SERVICE_VERSION:-1.0.0}
      - PORT=${SENTIMENT_AGENT_PORT:-8004}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
