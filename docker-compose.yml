services:
  # Infrastructure Services
  redis:
    image: redis:7-alpine
    container_name: chimera-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - chimera-redis-data:/data
    command: redis-server --appendonly yes --maxmemory ${REDIS_MAX_MEMORY:-256mb} --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: ${HEALTH_CHECK_INTERVAL:-10s}
      timeout: ${HEALTH_CHECK_TIMEOUT:-3s}
      retries: ${HEALTH_CHECK_RETRIES:-3}
      start_period: ${HEALTH_CHECK_START_PERIOD:-10s}
    networks:
      - chimera-backend
    restart: ${RESTART_POLICY:-unless-stopped}
    deploy:
      resources:
        limits:
          cpus: ${REDIS_CPU_LIMIT:-0.5}
          memory: ${REDIS_MEMORY_LIMIT:-256M}
        reservations:
          cpus: ${REDIS_CPU_RESERVATION:-0.25}
          memory: ${REDIS_MEMORY_RESERVATION:-128M}

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: chimera-kafka
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://${KAFKA_ADVERTISED_HOST:-kafka}:${KAFKA_PORT:-9092}
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=${KAFKA_REPLICATION_FACTOR:-1}
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_LOG_RETENTION_HOURS=${KAFKA_LOG_RETENTION_HOURS:-168}
      - KAFKA_LOG_SEGMENT_BYTES=${KAFKA_LOG_SEGMENT_BYTES:-1073741824}
    volumes:
      - chimera-kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: ${HEALTH_CHECK_INTERVAL:-30s}
      timeout: ${HEALTH_CHECK_TIMEOUT:-10s}
      retries: ${HEALTH_CHECK_RETRIES:-3}
      start_period: ${HEALTH_CHECK_START_PERIOD:-40s}
    depends_on:
      zookeeper:
        condition: service_healthy
    networks:
      - chimera-backend
    restart: ${RESTART_POLICY:-unless-stopped}
    deploy:
      resources:
        limits:
          cpus: ${KAFKA_CPU_LIMIT:-1.0}
          memory: ${KAFKA_MEMORY_LIMIT:-1G}
        reservations:
          cpus: ${KAFKA_CPU_RESERVATION:-0.5}
          memory: ${KAFKA_MEMORY_RESERVATION:-512M}

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: chimera-zookeeper
    ports:
      - "${ZOOKEEPER_PORT:-2181}:2181"
    environment:
      - ZOOKEEPER_CLIENT_PORT=${ZOOKEEPER_PORT:-2181}
      - ZOOKEEPER_TICK_TIME=2000
    volumes:
      - chimera-zookeeper-data:/var/lib/zookeeper/data
      - chimera-zookeeper-logs:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "${ZOOKEEPER_PORT:-2181}"]
      interval: ${HEALTH_CHECK_INTERVAL:-10s}
      timeout: ${HEALTH_CHECK_TIMEOUT:-5s}
      retries: ${HEALTH_CHECK_RETRIES:-3}
      start_period: ${HEALTH_CHECK_START_PERIOD:-20s}
    networks:
      - chimera-backend
    restart: ${RESTART_POLICY:-unless-stopped}
    deploy:
      resources:
        limits:
          cpus: ${ZOOKEEPER_CPU_LIMIT:-0.5}
          memory: ${ZOOKEEPER_MEMORY_LIMIT:-512M}
        reservations:
          cpus: ${ZOOKEEPER_CPU_RESERVATION:-0.25}
          memory: ${ZOOKEEPER_MEMORY_RESERVATION:-256M}

  milvus:
    image: milvusdb/milvus:v2.3.0
    container_name: chimera-milvus
    ports:
      - "${MILVUS_PORT:-19530}:19530"
      - "${MILVUS_METRICS_PORT:-9093}:9091"
    environment:
      - ETCD_ENDPOINTS=etcd:2379
      - MINIO_ADDRESS=minio:9000
      - COMMON_STORAGETYPE=${MILVUS_STORAGE_TYPE:-local}
    volumes:
      - chimera-milvus-data:/var/lib/milvus
    command: /milvus/bin/milvus run standalone
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/metrics"]
      interval: ${HEALTH_CHECK_INTERVAL:-30s}
      timeout: ${HEALTH_CHECK_TIMEOUT:-10s}
      retries: ${HEALTH_CHECK_RETRIES:-3}
      start_period: ${HEALTH_CHECK_START_PERIOD:-60s}
    depends_on:
      - etcd
      - minio
    networks:
      - chimera-backend
    restart: ${RESTART_POLICY:-unless-stopped}
    deploy:
      resources:
        limits:
          cpus: ${MILVUS_CPU_LIMIT:-2.0}
          memory: ${MILVUS_MEMORY_LIMIT:-2G}
        reservations:
          cpus: ${MILVUS_CPU_RESERVATION:-1.0}
          memory: ${MILVUS_MEMORY_RESERVATION:-1G}

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: chimera-etcd
    ports:
      - "${ETCD_PORT:-2379}:2379"
      - "${ETCD_PEER_PORT:-2380}:2380"
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:2379
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://etcd:2380
      - ETCD_INITIAL_CLUSTER=default=http://etcd:2380
    volumes:
      - chimera-etcd-data:/etcd
    networks:
      - chimera-backend
    restart: ${RESTART_POLICY:-unless-stopped}
    deploy:
      resources:
        limits:
          cpus: ${ETCD_CPU_LIMIT:-0.5}
          memory: ${ETCD_MEMORY_LIMIT:-512M}
        reservations:
          cpus: ${ETCD_CPU_RESERVATION:-0.25}
          memory: ${ETCD_MEMORY_RESERVATION:-256M}

  minio:
    image: minio/minio:latest
    container_name: chimera-minio
    environment:
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - chimera-minio-data:/minio_data
    command: minio server /minio_data
    networks:
      - chimera-backend
    restart: ${RESTART_POLICY:-unless-stopped}
    deploy:
      resources:
        limits:
          cpus: ${MINIO_CPU_LIMIT:-0.5}
          memory: ${MINIO_MEMORY_LIMIT:-512M}
        reservations:
          cpus: ${MINIO_CPU_RESERVATION:-0.25}
          memory: ${MINIO_MEMORY_RESERVATION:-256M}

  prometheus:
    image: prom/prometheus:latest
    container_name: chimera-prometheus
    ports:
      - "${PROMETHEUS_PORT:-9094}:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - chimera-prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-15d}'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: ${HEALTH_CHECK_INTERVAL:-30s}
      timeout: ${HEALTH_CHECK_TIMEOUT:-10s}
      retries: ${HEALTH_CHECK_RETRIES:-3}
      start_period: ${HEALTH_CHECK_START_PERIOD:-20s}
    networks:
      - chimera-monitoring
    restart: ${RESTART_POLICY:-unless-stopped}
    deploy:
      resources:
        limits:
          cpus: ${PROMETHEUS_CPU_LIMIT:-1.0}
          memory: ${PROMETHEUS_MEMORY_LIMIT:-1G}
        reservations:
          cpus: ${PROMETHEUS_CPU_RESERVATION:-0.5}
          memory: ${PROMETHEUS_MEMORY_RESERVATION:-512M}

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: chimera-jaeger
    ports:
      - "${JAEGER_PORT_UDP:-5775}:5775/udp"
      - "${JAEGER_PORT_UDP2:-6831}:6831/udp"
      - "${JAEGER_PORT_UDP3:-6832}:6832/udp"
      - "${JAEGER_PORT_HTTP:-5778}:5778"
      - "${JAEGER_PORT_UI:-16686}:16686"
      - "${JAEGER_PORT_THRIFT:-14268}:14268"
      - "${JAEGER_PORT_GRPC:-14250}:14250"
      - "${JAEGER_PORT_ZIPKIN:-9411}:9411"
      - "${JAEGER_PORT_OTLP_GRPC:-4317}:4317"
      - "${JAEGER_PORT_OTLP_HTTP:-4318}:4318"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - SPAN_STORAGE_TYPE=${JAEGER_STORAGE_TYPE:-memory}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686"]
      interval: ${HEALTH_CHECK_INTERVAL:-30s}
      timeout: ${HEALTH_CHECK_TIMEOUT:-10s}
      retries: ${HEALTH_CHECK_RETRIES:-3}
      start_period: ${HEALTH_CHECK_START_PERIOD:-20s}
    networks:
      - chimera-monitoring
    restart: ${RESTART_POLICY:-unless-stopped}
    deploy:
      resources:
        limits:
          cpus: ${JAEGER_CPU_LIMIT:-1.0}
          memory: ${JAEGER_MEMORY_LIMIT:-1G}
        reservations:
          cpus: ${JAEGER_CPU_RESERVATION:-0.5}
          memory: ${JAEGER_MEMORY_RESERVATION:-512M}

  grafana:
    image: grafana/grafana:latest
    container_name: chimera-grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-chimera}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=${GRAFANA_PLUGINS:-}
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost:3000}
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
    volumes:
      - chimera-grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: ${HEALTH_CHECK_INTERVAL:-30s}
      timeout: ${HEALTH_CHECK_TIMEOUT:-10s}
      retries: ${HEALTH_CHECK_RETRIES:-3}
      start_period: ${HEALTH_CHECK_START_PERIOD:-20s}
    networks:
      - chimera-monitoring
      - chimera-frontend
    restart: ${RESTART_POLICY:-unless-stopped}
    deploy:
      resources:
        limits:
          cpus: ${GRAFANA_CPU_LIMIT:-0.5}
          memory: ${GRAFANA_MEMORY_LIMIT:-512M}
        reservations:
          cpus: ${GRAFANA_CPU_RESERVATION:-0.25}
          memory: ${GRAFANA_MEMORY_RESERVATION:-256M}

  # Infrastructure Monitoring
  netdata:
    image: netdata/netdata:latest
    container_name: chimera-netdata
    hostname: chimera-dev
    ports:
      - "${NETDATA_PORT:-19999}:19999"
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - chimera-netdata-config:/etc/netdata
      - chimera-netdata-lib:/var/lib/netdata
      - chimera-netdata-cache:/var/cache/netdata
    environment:
      - NETDATA_CLAIM_TOKEN=${NETDATA_CLAIM_TOKEN:-}
      - NETDATA_CLAIM_URL=${NETDATA_CLAIM_URL:-}
      - NETDATA_CLAIM_ROOMS=${NETDATA_CLAIM_ROOMS:-}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19999/api/v1/info"]
      interval: ${HEALTH_CHECK_INTERVAL:-30s}
      timeout: ${HEALTH_CHECK_TIMEOUT:-10s}
      retries: ${HEALTH_CHECK_RETRIES:-3}
      start_period: ${HEALTH_CHECK_START_PERIOD:-30s}
    networks:
      - chimera-monitoring
    restart: ${RESTART_POLICY:-unless-stopped}
    deploy:
      resources:
        limits:
          cpus: ${NETDATA_CPU_LIMIT:-0.5}
          memory: ${NETDATA_MEMORY_LIMIT:-512M}
        reservations:
          cpus: ${NETDATA_CPU_RESERVATION:-0.1}
          memory: ${NETDATA_MEMORY_RESERVATION:-128M}

  # Core Services
  openclaw-orchestrator:
    build:
      context: .
      dockerfile: services/openclaw-orchestrator/Dockerfile
      args:
        - SERVICE_VERSION=${SERVICE_VERSION:-1.0.0}
    image: chimera/openclaw-orchestrator:${SERVICE_VERSION:-1.0.0}
    container_name: chimera-orchestrator
    ports:
      - "${OPENCLAW_ORCHESTRATOR_PORT:-8000}:8000"
    environment:
      - SERVICE_NAME=openclaw-orchestrator
      - SERVICE_VERSION=${SERVICE_VERSION:-1.0.0}
      - PORT=${OPENCLAW_ORCHESTRATOR_PORT:-8000}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      - KAFKA_TOPIC_PREFIX=${KAFKA_TOPIC_PREFIX:-chimera}
      - OTLP_ENDPOINT=${OTLP_ENDPOINT:-http://jaeger:4317}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SCENESPEAK_AGENT_URL=${SCENESPEAK_AGENT_URL:-http://scenespeak-agent:8001}
      # - CAPTIONING_AGENT_URL=${CAPTIONING_AGENT_URL:-http://captioning-agent:8002}  # MOVED TO FUTURE_CONCEPTS
      # - BSL_AGENT_URL=${BSL_AGENT_URL:-http://bsl-agent:8003}  # MOVED TO FUTURE_CONCEPTS
      - SENTIMENT_AGENT_URL=${SENTIMENT_AGENT_URL:-http://sentiment-agent:8004}
      # - LIGHTING_SOUND_MUSIC_URL=${LIGHTING_SOUND_MUSIC_URL:-http://lighting-sound-music:8005}  # MOVED TO FUTURE_CONCEPTS
      - SAFETY_FILTER_URL=${SAFETY_FILTER_URL:-http://safety-filter:8006}
      - MUSIC_GENERATION_URL=${MUSIC_GENERATION_URL:-http://music-generation:8011}
    volumes:
      - chimera-openclaw-cache:/app/cache
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: ${HEALTH_CHECK_INTERVAL:-30s}
      timeout: ${HEALTH_CHECK_TIMEOUT:-10s}
      retries: ${HEALTH_CHECK_RETRIES:-3}
      start_period: ${HEALTH_CHECK_START_PERIOD:-60s}
    networks:
      - chimera-backend
      - chimera-frontend
    restart: ${RESTART_POLICY:-unless-stopped}
    deploy:
      resources:
        limits:
          cpus: ${OPENCLAW_CPU_LIMIT:-1.0}
          memory: ${OPENCLAW_MEMORY_LIMIT:-512M}
        reservations:
          cpus: ${OPENCLAW_CPU_RESERVATION:-0.25}
          memory: ${OPENCLAW_MEMORY_RESERVATION:-128M}

  scenespeak-agent:
    build:
      context: .
      dockerfile: services/scenespeak-agent/Dockerfile
      args:
        - SERVICE_VERSION=${SERVICE_VERSION:-1.0.0}
    image: chimera/scenespeak-agent:${SERVICE_VERSION:-1.0.0}
    container_name: chimera-scenespeak
    ports:
      - "${SCENESPEAK_AGENT_PORT:-8001}:8001"
    environment:
      - SERVICE_NAME=scenespeak-agent
      - SERVICE_VERSION=${SERVICE_VERSION:-1.0.0}
      - PORT=${SCENESPEAK_AGENT_PORT:-8001}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      - KAFKA_TOPIC_PREFIX=${KAFKA_TOPIC_PREFIX:-chimera}
      - OTLP_ENDPOINT=${OTLP_ENDPOINT:-http://jaeger:4317}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOCAL_LLM_ENABLED=${SCENESPEAK_LOCAL_LLM_ENABLED:-true}
      - LOCAL_LLM_URL=${SCENESPEAK_LOCAL_LLM_URL:-http://ollama:11434}
      - LOCAL_LLM_MODEL=${SCENESPEAK_LOCAL_LLM_MODEL:-llama3.2}
      - GLM_API_KEY=${SCENESPEAK_GLM_API_KEY:-}
      - GLM_API_FALLBACK=${SCENESPEAK_GLM_API_FALLBACK:-true}
    volumes:
      - chimera-scenespeak-cache:/app/cache
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health/live"]
      interval: ${HEALTH_CHECK_INTERVAL:-30s}
      timeout: ${HEALTH_CHECK_TIMEOUT:-10s}
      retries: ${HEALTH_CHECK_RETRIES:-3}
      start_period: ${HEALTH_CHECK_START_PERIOD:-90s}
    networks:
      - chimera-backend
    restart: ${RESTART_POLICY:-unless-stopped}
    deploy:
      resources:
        limits:
          cpus: ${SCENESPEAK_CPU_LIMIT:-2.0}
          memory: ${SCENESPEAK_MEMORY_LIMIT:-1G}
        reservations:
          cpus: ${SCENESPEAK_CPU_RESERVATION:-0.5}
          memory: ${SCENESPEAK_MEMORY_RESERVATION:-256M}

