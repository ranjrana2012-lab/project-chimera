[pytest]
# Pytest configuration for Project Chimera

# Minimum pytest version
minversion = 7.0

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Asyncio mode
asyncio_mode = auto

# Output options
addopts =
    # Verbose output
    -v
    # Show summary of all test outcomes
    -ra
    # Show local variables in tracebacks
    --showlocals
    # Enable strict markers
    --strict-markers
    # Show warnings
    -W default
    # Coverage
    --cov=services
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    # Coverage options
    --cov-config=tests/pytest.ini

# Markers for test categorization
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (require external services)
    load: Load and performance tests
    red_team: Red team / security tests
    accessibility: WCAG accessibility tests
    kafka: Tests requiring Kafka
    redis: Tests requiring Redis

# Filter warnings
filterwarnings =
    # Ignore deprecation warnings in dependencies
    ignore::DeprecationWarning
    # Treat warnings as errors in production code
    error::Warning

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coverage options
[coverage:run]
source = services
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */.venv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
