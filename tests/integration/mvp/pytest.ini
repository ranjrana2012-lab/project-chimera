[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    integration: Integration tests
    mvp: MVP validation tests
    requires_docker: tests that require a running Docker Compose stack
    slow: Slow running tests
asyncio_mode = auto
