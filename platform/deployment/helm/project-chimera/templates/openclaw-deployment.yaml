{{- if .Values.openclaw.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "project-chimera.fullname" . }}-openclaw
  namespace: {{ .Values.namespace.name | default "chimera-live" }}
  labels:
    {{- include "project-chimera.labels" . | nindent 4 }}
    component: openclaw
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.openclaw.persistence.storageClass | default .Values.global.storageClass }}
  resources:
    requests:
      storage: {{ .Values.openclaw.persistence.size }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "project-chimera.fullname" . }}-openclaw
  namespace: {{ .Values.namespace.name | default "chimera-live" }}
  labels:
    {{- include "project-chimera.labels" . | nindent 4 }}
    component: openclaw
spec:
  {{- if not .Values.openclaw.autoscaling.enabled }}
  replicas: {{ .Values.openclaw.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "project-chimera.selectorLabels" . | nindent 6 }}
      component: openclaw
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "project-chimera.selectorLabels" . | nindent 8 }}
        component: openclaw
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: openclaw
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false  # OpenClaw needs write access
        image: "{{ .Values.global.imageRegistry }}/{{ .Values.openclaw.image.repository }}:{{ .Values.openclaw.image.tag | default .Values.images.tag }}"
        imagePullPolicy: {{ .Values.images.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.openclaw.service.port }}
          protocol: TCP
        - name: websocket
          containerPort: 8080
          protocol: TCP
        env:
        - name: OPENCLAW_API_PORT
          value: "{{ .Values.openclaw.service.port }}"
        - name: OPENCLAW_WS_PORT
          value: "8080"
        - name: OPENCLAW_WORKSPACE
          value: /workspace
        - name: OPENCLAW_LOG_LEVEL
          value: INFO
        resources:
          {{- toYaml .Values.openclaw.resources | nindent 10 }}
        volumeMounts:
        - name: workspace
          mountPath: /workspace
        - name: model-cache
          mountPath: /models
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 30
      volumes:
      - name: workspace
        persistentVolumeClaim:
          claimName: {{ include "project-chimera.fullname" . }}-openclaw
      - name: model-cache
        persistentVolumeClaim:
          claimName: {{ include "project-chimera.fullname" . }}-model-cache
      nodeSelector:
        accelerator: nvidia-gpu
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
{{- end }}
