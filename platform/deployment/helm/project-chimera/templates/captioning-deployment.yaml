{{- if .Values.captioning.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "project-chimera.fullname" . }}-captioning
  namespace: {{ .Values.namespace.name | default "chimera-live" }}
  labels:
    {{- include "project-chimera.labels" . | nindent 4 }}
    component: captioning
spec:
  replicas: {{ .Values.captioning.replicaCount }}
  selector:
    matchLabels:
      {{- include "project-chimera.selectorLabels" . | nindent 6 }}
      component: captioning
  template:
    metadata:
      labels:
        {{- include "project-chimera.selectorLabels" . | nindent 8 }}
        component: captioning
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: captioning
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        image: "{{ .Values.global.imageRegistry }}/{{ .Values.captioning.image.repository }}:{{ .Values.captioning.image.tag | default .Values.images.tag }}"
        imagePullPolicy: {{ .Values.images.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.captioning.service.port }}
          protocol: TCP
        env:
        - name: CAPTIONING_PORT
          value: "{{ .Values.captioning.service.port }}"
        - name: CAPTIONING_MODEL
          value: whisper-small
        - name: CAPTIONING_LOG_LEVEL
          value: INFO
        resources:
          {{- toYaml .Values.captioning.resources | nindent 10 }}
        volumeMounts:
        - name: model-cache
          mountPath: /models
        - name: tmp
          mountPath: /tmp
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
      volumes:
      - name: model-cache
        persistentVolumeClaim:
          claimName: {{ include "project-chimera.fullname" . }}-model-cache
      - name: tmp
        emptyDir: {}
      nodeSelector:
        accelerator: nvidia-gpu
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "project-chimera.fullname" . }}-captioning
  namespace: {{ .Values.namespace.name | default "chimera-live" }}
  labels:
    {{- include "project-chimera.labels" . | nindent 4 }}
    component: captioning
spec:
  type: ClusterIP
  ports:
  - name: http
    port: {{ .Values.captioning.service.port }}
    targetPort: http
    protocol: TCP
  selector:
    {{- include "project-chimera.selectorLabels" . | nindent 4 }}
    component: captioning
{{- end }}
