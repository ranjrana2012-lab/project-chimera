{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "project-chimera.fullname" . }}
  namespace: {{ .Values.namespace.name | default "chimera-live" }}
  labels:
    {{- include "project-chimera.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
  {{- range .Values.ingress.hosts }}
  - host: {{ .host | default $.Values.ingress.host }}
    http:
      paths:
      {{- range .paths }}
      - path: {{ .path }}
        pathType: Prefix
        backend:
          service:
            name: {{ .service }}
            port:
              number: {{ .port }}
      {{- end }}
  {{- end }}
  # Default routes from values
  - host: {{ .Values.ingress.host }}
    http:
      paths:
      {{- if .Values.openclaw.enabled }}
      - path: /openclaw(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: {{ include "project-chimera.fullname" . }}-openclaw
            port:
              number: {{ .Values.openclaw.service.port }}
      {{- end }}
      {{- if .Values.scenespeak.enabled }}
      - path: /api/scenespeak(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: {{ include "project-chimera.fullname" . }}-scenespeak
            port:
              number: {{ .Values.scenespeak.service.port }}
      {{- end }}
      {{- if .Values.captioning.enabled }}
      - path: /api/captioning(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: {{ include "project-chimera.fullname" . }}-captioning
            port:
              number: {{ .Values.captioning.service.port }}
      {{- end }}
      {{- if .Values.bsl.enabled }}
      - path: /api/bsl(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: {{ include "project-chimera.fullname" . }}-bsl
            port:
              number: {{ .Values.bsl.service.port }}
      {{- end }}
      {{- if .Values.sentiment.enabled }}
      - path: /api/sentiment(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: {{ include "project-chimera.fullname" . }}-sentiment
            port:
              number: {{ .Values.sentiment.service.port }}
      {{- end }}
      {{- if .Values.lighting.enabled }}
      - path: /api/lighting(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: {{ include "project-chimera.fullname" . }}-lighting
            port:
              number: {{ .Values.lighting.service.port }}
      {{- end }}
      {{- if .Values.safety.enabled }}
      - path: /api/safety(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: {{ include "project-chimera.fullname" . }}-safety
            port:
              number: {{ .Values.safety.service.port }}
      {{- end }}
      {{- if .Values.console.enabled }}
      - path: /console(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: {{ include "project-chimera.fullname" . }}-console
            port:
              number: {{ .Values.console.service.port }}
      {{- end }}
      {{- if .Values.platform.dashboard.ingress.enabled }}
      - path: /dashboard(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: {{ include "project-chimera.fullname" . }}-dashboard
            port:
              number: {{ .Values.platform.dashboard.service.port }}
      {{- end }}
      {{- if .Values.platform.cicdGateway.ingress.enabled }}
      - path: /cicd(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: {{ include "project-chimera.fullname" . }}-cicd-gateway
            port:
              number: {{ .Values.platform.cicdGateway.service.port }}
      {{- end }}
{{- end }}
