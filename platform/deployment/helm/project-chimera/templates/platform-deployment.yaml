{{- if .Values.platform.enabled }}
---
{{- if .Values.platform.testOrchestrator.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "project-chimera.fullname" . }}-test-history
  namespace: {{ .Values.namespace.name | default "chimera-live" }}
  labels:
    {{- include "project-chimera.labels" . | nindent 4 }}
    component: test-orchestrator
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.global.storageClass }}
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "project-chimera.fullname" . }}-coverage-reports
  namespace: {{ .Values.namespace.name | default "chimera-live" }}
  labels:
    {{- include "project-chimera.labels" . | nindent 4 }}
    component: test-orchestrator
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.global.storageClass }}
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "project-chimera.fullname" . }}-test-orchestrator
  namespace: {{ .Values.namespace.name | default "chimera-live" }}
  labels:
    {{- include "project-chimera.labels" . | nindent 4 }}
    component: test-orchestrator
spec:
  replicas: {{ .Values.platform.testOrchestrator.replicaCount }}
  selector:
    matchLabels:
      {{- include "project-chimera.selectorLabels" . | nindent 6 }}
      component: test-orchestrator
  template:
    metadata:
      labels:
        {{- include "project-chimera.selectorLabels" . | nindent 8 }}
        component: test-orchestrator
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: test-orchestrator
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        image: "{{ .Values.global.imageRegistry }}/test-orchestrator:{{ .Values.images.tag }}"
        imagePullPolicy: {{ .Values.images.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.platform.testOrchestrator.service.port }}
          protocol: TCP
        - name: websocket
          containerPort: 8081
          protocol: TCP
        env:
        - name: ORCHESTRATOR_PORT
          value: "{{ .Values.platform.testOrchestrator.service.port }}"
        - name: ORCHESTRATOR_WS_PORT
          value: "8081"
        - name: ORCHESTRATOR_LOG_LEVEL
          value: INFO
        resources:
          {{- toYaml .Values.platform.testOrchestrator.resources | nindent 10 }}
        volumeMounts:
        - name: test-history
          mountPath: /data/history
        - name: coverage-reports
          mountPath: /data/coverage
        - name: tmp
          mountPath: /tmp
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: test-history
        persistentVolumeClaim:
          claimName: {{ include "project-chimera.fullname" . }}-test-history
      - name: coverage-reports
        persistentVolumeClaim:
          claimName: {{ include "project-chimera.fullname" . }}-coverage-reports
      - name: tmp
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "project-chimera.fullname" . }}-test-orchestrator
  namespace: {{ .Values.namespace.name | default "chimera-live" }}
  labels:
    {{- include "project-chimera.labels" . | nindent 4 }}
    component: test-orchestrator
spec:
  type: ClusterIP
  ports:
  - name: http
    port: {{ .Values.platform.testOrchestrator.service.port }}
    targetPort: http
    protocol: TCP
  - name: websocket
    port: 8081
    targetPort: websocket
    protocol: TCP
  selector:
    {{- include "project-chimera.selectorLabels" . | nindent 4 }}
    component: test-orchestrator
{{- end }}
---
