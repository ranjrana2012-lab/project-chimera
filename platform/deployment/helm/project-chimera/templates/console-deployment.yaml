{{- if .Values.console.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "project-chimera.fullname" . }}-console
  namespace: {{ .Values.namespace.name | default "chimera-live" }}
  labels:
    {{- include "project-chimera.labels" . | nindent 4 }}
    component: console
spec:
  replicas: {{ .Values.console.replicaCount }}
  selector:
    matchLabels:
      {{- include "project-chimera.selectorLabels" . | nindent 6 }}
      component: console
  template:
    metadata:
      labels:
        {{- include "project-chimera.selectorLabels" . | nindent 8 }}
        component: console
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: console
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        image: "{{ .Values.global.imageRegistry }}/{{ .Values.console.image.repository }}:{{ .Values.console.image.tag | default .Values.images.tag }}"
        imagePullPolicy: {{ .Values.images.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.console.service.port }}
          protocol: TCP
        - name: websocket
          containerPort: 8080
          protocol: TCP
        env:
        - name: CONSOLE_PORT
          value: "{{ .Values.console.service.port }}"
        - name: CONSOLE_WS_PORT
          value: "8080"
        - name: CONSOLE_LOG_LEVEL
          value: INFO
        resources:
          {{- toYaml .Values.console.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "project-chimera.fullname" . }}-console
  namespace: {{ .Values.namespace.name | default "chimera-live" }}
  labels:
    {{- include "project-chimera.labels" . | nindent 4 }}
    component: console
spec:
  type: ClusterIP
  ports:
  - name: http
    port: {{ .Values.console.service.port }}
    targetPort: http
    protocol: TCP
  - name: websocket
    port: 8080
    targetPort: websocket
    protocol: TCP
  selector:
    {{- include "project-chimera.selectorLabels" . | nindent 4 }}
    component: console
{{- end }}
