{{- if .Values.lighting.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "project-chimera.fullname" . }}-lighting
  namespace: {{ .Values.namespace.name | default "chimera-live" }}
  labels:
    {{- include "project-chimera.labels" . | nindent 4 }}
    component: lighting
spec:
  replicas: {{ .Values.lighting.replicaCount }}
  selector:
    matchLabels:
      {{- include "project-chimera.selectorLabels" . | nindent 6 }}
      component: lighting
  template:
    metadata:
      labels:
        {{- include "project-chimera.selectorLabels" . | nindent 8 }}
        component: lighting
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: lighting
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        image: "{{ .Values.global.imageRegistry }}/{{ .Values.lighting.image.repository }}:{{ .Values.lighting.image.tag | default .Values.images.tag }}"
        imagePullPolicy: {{ .Values.images.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.lighting.service.port }}
          protocol: TCP
        env:
        - name: LIGHTING_PORT
          value: "{{ .Values.lighting.service.port }}"
        - name: LIGHTING_LOG_LEVEL
          value: INFO
        resources:
          {{- toYaml .Values.lighting.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "project-chimera.fullname" . }}-lighting
  namespace: {{ .Values.namespace.name | default "chimera-live" }}
  labels:
    {{- include "project-chimera.labels" . | nindent 4 }}
    component: lighting
spec:
  type: ClusterIP
  ports:
  - name: http
    port: {{ .Values.lighting.service.port }}
    targetPort: http
    protocol: TCP
  selector:
    {{- include "project-chimera.selectorLabels" . | nindent 4 }}
    component: lighting
{{- end }}
