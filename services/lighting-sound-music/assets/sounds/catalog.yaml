# Sound Effects Library Catalog
# This file contains metadata for all sound effects in the library

# Format specification:
# id: Unique identifier (kebab-case)
# name: Human-readable display name
# filename: Actual audio file name
# category: effects, ambient, or transitions
# tags: Array of searchable keywords
# duration: Length in seconds (float)
# loop: Whether sound should loop continuously (boolean)
# volume: Default volume level 0.0-1.0 (float)
# description: Brief description of the sound

