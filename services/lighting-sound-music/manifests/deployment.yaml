apiVersion: apps/v1
kind: Deployment
metadata:
  name: lighting-sound-music
  namespace: chimera
  labels:
    app: lighting-sound-music
    component: lsm
    version: v0.1.0
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: lighting-sound-music
      component: lsm
  template:
    metadata:
      labels:
        app: lighting-sound-music
        component: lsm
        version: v0.1.0
    spec:
      containers:
      - name: lsm-service
        image: lighting-sound-music:v0.1.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8005
          name: http
          protocol: TCP
        env:
        - name: PORT
          value: "8005"
        - name: HOST
          value: "0.0.0.0"
        - name: LOG_LEVEL
          value: "INFO"
        - name: LSM_CONFIG_PATH
          value: "/app/config/config.yaml"
        # sACN configuration
        - name: SACN_ENABLED
          value: "true"
        - name: SACN_HOST
          value: "127.0.0.1"
        - name: SACN_PORT
          value: "5568"
        # Model configuration
        - name: MODELS_DIR
          value: "/app/models"
        - name: DEFAULT_MODEL
          value: "turbo"
        volumeMounts:
        # ACE-Step-1.5 models
        - name: ace-models
          mountPath: /app/models
          readOnly: true
        # Sound effects library
        - name: sound-effects
          mountPath: /app/assets/sounds
        # Generated music tracks
        - name: music-library
          mountPath: /app/assets/music
        # Configuration
        - name: config
          mountPath: /app/config
          readOnly: true
        # Logs
        - name: logs
          mountPath: /app/logs
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8005
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8005
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health/live
            port: 8005
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 12  # 60 seconds total
      volumes:
      # ACE-Step-1.5 models (large, should be preloaded)
      - name: ace-models
        persistentVolumeClaim:
          claimName: ace-models-pvc
      # Sound effects library
      - name: sound-effects
        persistentVolumeClaim:
          claimName: sound-effects-pvc
      # Generated music tracks
      - name: music-library
        persistentVolumeClaim:
          claimName: music-library-pvc
      # Configuration volume
      - name: config
        configMap:
          name: lsm-config
      # Logs volume
      - name: logs
        emptyDir: {}
      # Node affinity for GPU/acceleration support
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
              - key: gpu
                operator: In
                values:
                - "true"
