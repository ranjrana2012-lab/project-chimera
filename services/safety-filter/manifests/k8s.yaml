apiVersion: v1
kind: ConfigMap
metadata:
  name: safety-filter-config
  namespace: project-chimera
  labels:
    app: safety-filter
    component: service
data:
  SERVICE_NAME: "safety-filter"
  PORT: "8006"
  LOG_LEVEL: "INFO"
  ENVIRONMENT: "production"
  DEVICE: "cpu"
  MAX_VRAM_MB: "2048"
  ENABLE_CONTENT_MODERATION: "true"
  ENABLE_PATTERN_MATCHING: "true"
  ENABLE_ML_SAFETY: "true"
  CONFIDENCE_THRESHOLD: "0.7"
  BLOCK_THRESHOLD: "0.8"
  BATCH_SIZE: "32"
  MAX_TEXT_LENGTH: "2048"
  TORCH_THREADS: "4"
---
apiVersion: v1
kind: Service
metadata:
  name: safety-filter
  namespace: project-chimera
  labels:
    app: safety-filter
    component: service
spec:
  type: ClusterIP
  ports:
  - port: 8006
    targetPort: 8006
    protocol: TCP
    name: http
  selector:
    app: safety-filter
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: safety-filter-models
  namespace: project-chimera
  labels:
    app: safety-filter
    component: storage
spec:
  accessModes:
  - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
  storageClassName: nfs-sc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: safety-filter
  namespace: project-chimera
  labels:
    app: safety-filter
    component: service
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: safety-filter
  template:
    metadata:
      labels:
        app: safety-filter
        component: service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8006"
        prometheus.io/path: "/metrics"
    spec:
      hostNetwork: false
      dnsPolicy: ClusterFirst
      containers:
      - name: safety-filter
        image: ghcr.io/project-chimera/safety-filter:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8006
          protocol: TCP
          name: http
        envFrom:
        - configMapRef:
            name: safety-filter-config
        env:
        - name: MODEL_PATH
          value: "/models/safety"
        - name: HUGGINGFACE_CACHE_DIR
          value: "/models/cache"
        - name: OTLP_ENDPOINT
          value: "http://opentelemetry-collector.observability.svc.cluster.local:4317"
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
        volumeMounts:
        - name: models
          mountPath: /models
        - name: tmp
          mountPath: /tmp
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8006
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8006
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health/live
            port: 8006
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 18
      volumes:
      - name: models
        persistentVolumeClaim:
          claimName: safety-filter-models
      - name: tmp
        emptyDir:
          sizeLimit: 2Gi
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - safety-filter
              topologyKey: kubernetes.io/hostname
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: safety-filter
  namespace: project-chimera
  labels:
    app: safety-filter
    component: service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: safety-filter
  minReplicas: 2
  maxReplicas: 4
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 1
        periodSeconds: 30
      selectPolicy: Max
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: safety-filter
  namespace: project-chimera
  labels:
    app: safety-filter
    component: service
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: safety-filter
