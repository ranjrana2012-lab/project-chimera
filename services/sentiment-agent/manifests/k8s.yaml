apiVersion: v1
kind: ConfigMap
metadata:
  name: sentiment-agent-config
  namespace: project-chimera
  labels:
    app: sentiment-agent
    component: service
data:
  SERVICE_NAME: "sentiment-agent"
  PORT: "8004"
  LOG_LEVEL: "INFO"
  ENVIRONMENT: "production"
  DEVICE: "cpu"
  DEFAULT_MODEL: "distilbert-base-uncased-finetuned-sst-2-english"
  MAX_VRAM_MB: "2048"
  MODEL_OFFLOAD: "false"
  BATCH_SIZE: "32"
  MAX_TEXT_LENGTH: "512"
  TORCH_THREADS: "4"
  VISUAL_CORE_URL: "http://visual-core:8014"
  ENABLE_VIDEO_BRIEFING: "true"
  ENABLE_VIDEO_TRENDS: "true"
  DEFAULT_BRIEFING_DURATION: "90"
  DEFAULT_BRIEFING_STYLE: "corporate-briefing"
---
apiVersion: v1
kind: Service
metadata:
  name: sentiment-agent
  namespace: project-chimera
  labels:
    app: sentiment-agent
    component: service
spec:
  type: ClusterIP
  ports:
  - port: 8004
    targetPort: 8004
    protocol: TCP
    name: http
  selector:
    app: sentiment-agent
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sentiment-agent-models
  namespace: project-chimera
  labels:
    app: sentiment-agent
    component: storage
spec:
  accessModes:
  - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
  storageClassName: nfs-sc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentiment-agent
  namespace: project-chimera
  labels:
    app: sentiment-agent
    component: service
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: sentiment-agent
  template:
    metadata:
      labels:
        app: sentiment-agent
        component: service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8004"
        prometheus.io/path: "/metrics"
    spec:
      hostNetwork: false
      hostPID: false
      hostIPC: false
      dnsPolicy: ClusterFirst
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: sentiment-agent
        image: ghcr.io/project-chimera/sentiment-agent:latest
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false
        ports:
        - containerPort: 8004
          protocol: TCP
          name: http
        envFrom:
        - configMapRef:
            name: sentiment-agent-config
        env:
        - name: MODEL_PATH
          value: "/models/sentiment"
        - name: HUGGINGFACE_CACHE_DIR
          value: "/models/cache"
        - name: OTLP_ENDPOINT
          value: "http://opentelemetry-collector.observability.svc.cluster.local:4317"
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
        volumeMounts:
        - name: models
          mountPath: /models
        - name: tmp
          mountPath: /tmp
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8004
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8004
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health/live
            port: 8004
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 18
      volumes:
      - name: models
        persistentVolumeClaim:
          claimName: sentiment-agent-models
      - name: tmp
        emptyDir:
          sizeLimit: 2Gi
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - sentiment-agent
              topologyKey: kubernetes.io/hostname
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sentiment-agent
  namespace: project-chimera
  labels:
    app: sentiment-agent
    component: service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sentiment-agent
  minReplicas: 2
  maxReplicas: 4
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 1
        periodSeconds: 30
      selectPolicy: Max
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: sentiment-agent
  namespace: project-chimera
  labels:
    app: sentiment-agent
    component: service
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: sentiment-agent
