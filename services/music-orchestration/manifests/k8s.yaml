apiVersion: apps/v1
kind: Deployment
metadata:
  name: music-orchestration
  namespace: chimera
  labels:
    app: music-orchestration
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: music-orchestration
  template:
    metadata:
      labels:
        app: music-orchestration
        version: v1
    spec:
      containers:
      - name: music-orchestration
        image: chimera/music-orchestration:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8012
          protocol: TCP
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        env:
        - name: GENERATION_SERVICE_URL
          value: "http://music-generation.chimera.svc.cluster.local:8011"
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: chimera-secrets
              key: redis-url
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: chimera-secrets
              key: database-url
        - name: MINIO_ENDPOINT
          value: "minio.chimera.svc.cluster.local:9000"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: chimera-secrets
              key: jwt-secret
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 3
          timeoutSeconds: 2
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: music-orchestration
  namespace: chimera
  labels:
    app: music-orchestration
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8012
    targetPort: http
    protocol: TCP
  selector:
    app: music-orchestration
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: music-orchestration-hpa
  namespace: chimera
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: music-orchestration
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
