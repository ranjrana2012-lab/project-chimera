---
apiVersion: v1
kind: ConfigMap
metadata:
  name: educational-platform-config
  namespace: project-chimera
data:
  LOG_LEVEL: "INFO"
  PORT: "8012"
  OPENCLAW_URL: "http://openclaw-orchestrator:8000"
  BSL_AGENT_URL: "http://bsl-agent:8003"
  CAPTIONING_AGENT_URL: "http://captioning-agent:8002"
  SENTIMENT_AGENT_URL: "http://sentiment-agent:8004"
  OTLP_ENDPOINT: "http://jaeger:4317"
---
apiVersion: v1
kind: Service
metadata:
  name: educational-platform
  namespace: project-chimera
  labels:
    app: educational-platform
    service: educational-platform
spec:
  type: ClusterIP
  ports:
  - port: 8012
    targetPort: 8012
    protocol: TCP
    name: http
  selector:
    app: educational-platform
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: educational-platform
  namespace: project-chimera
  labels:
    app: educational-platform
    service: educational-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: educational-platform
  template:
    metadata:
      labels:
        app: educational-platform
        service: educational-platform
    spec:
      hostNetwork: false
      hostPID: false
      hostIPC: false
      dnsPolicy: ClusterFirst
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: educational-platform
        image: educational-platform:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8012
          protocol: TCP
        env:
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: educational-platform-config
              key: LOG_LEVEL
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: educational-platform-config
              key: PORT
        - name: OPENCLAW_URL
          valueFrom:
            configMapKeyRef:
              name: educational-platform-config
              key: OPENCLAW_URL
        - name: BSL_AGENT_URL
          valueFrom:
            configMapKeyRef:
              name: educational-platform-config
              key: BSL_AGENT_URL
        - name: CAPTIONING_AGENT_URL
          valueFrom:
            configMapKeyRef:
              name: educational-platform-config
              key: CAPTIONING_AGENT_URL
        - name: SENTIMENT_AGENT_URL
          valueFrom:
            configMapKeyRef:
              name: educational-platform-config
              key: SENTIMENT_AGENT_URL
        - name: OTLP_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: educational-platform-config
              key: OTLP_ENDPOINT
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8012
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8012
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: educational-platform-hpa
  namespace: project-chimera
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: educational-platform
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
