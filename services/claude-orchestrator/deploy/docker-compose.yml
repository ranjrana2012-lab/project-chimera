version: '3.8'

services:
  # Redis for state persistence
  redis:
    image: redis:7-alpine
    container_name: chimera-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Claude Orchestrator
  orchestrator:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: claude-orchestrator
    ports:
      - "8010:8010"
    environment:
      - CLAUDE_SERVICE_NAME=claude-orchestrator
      - CLAUDE_PORT=8010
      - CLAUDE_HOST=0.0.0.0
      - CLAUDE_NEMOCLAW_BASE_URL=http://nemoclaw-orchestrator:8000
      - CLAUDE_REDIS_URL=redis://redis:6379
      - CLAUDE_STATE_DIR=/state/claude-orchestrator
      - CLAUDE_POLICY_CONFIG_PATH=/config/policies.yaml
      - CLAUDE_LOG_LEVEL=info
      - CLAUDE_RALPH_LOOP_ENABLED=true
    volumes:
      - orchestrator-state:/state/claude-orchestrator
      - ./config/policies.yaml:/config/policies.yaml:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/api/status"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Nginx reverse proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: chimera-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/ssl:/etc/nginx/ssl:ro
    depends_on:
      - orchestrator
    restart: unless-stopped

volumes:
  redis-data:
  orchestrator-state:
