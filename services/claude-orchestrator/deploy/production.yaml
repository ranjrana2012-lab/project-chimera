# Production Configuration for Claude Orchestrator
# This file contains security and performance best practices

server:
  # HTTP server configuration
  port: 8010
  host: "0.0.0.0"
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 120s
  max_header_bytes: 1048576

# Security settings
security:
  # CORS configuration
  cors:
    allowed_origins:
      - "https://dashboard.chimera.local"
      - "https://orchestrator.chimera.local"
    allowed_methods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "OPTIONS"
    allowed_headers:
      - "Authorization"
      - "Content-Type"
    exposed_headers:
      - "Content-Length"
      - "Content-Type"
    allow_credentials: true
    max_age: 86400

  # Rate limiting
  rate_limit:
    enabled: true
    requests_per_minute: 60
    burst: 10

  # Authentication
  auth:
    enabled: true
    jwt_secret: "${JWT_SECRET}"
    jwt_expiry: 24h
    refresh_token_expiry: 168h

  # TLS/SSL
  tls:
    enabled: true
    cert_file: "/etc/ssl/certs/tls.crt"
    key_file: "/etc/ssl/certs/tls.key"
    min_version: "TLS1.2"
    cipher_suites:
      - "TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256"
      - "TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384"
      - "TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256"
      - "TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384"

# Performance settings
performance:
  # Connection pooling
  pool:
    max_idle_conns: 100
    max_idle_conns_per_host: 10
    idle_conn_timeout: 90s

  # Caching
  cache:
    enabled: true
    ttl: 60s
    max_size: 1000

  # Request timeout
  timeout:
    health_check: 10s
    api_request: 30s
    websocket_write: 10s

# Monitoring
monitoring:
  # Prometheus metrics
  metrics:
    enabled: true
    path: "/metrics"

  # Distributed tracing
  tracing:
    enabled: true
    sampler: 0.1
    jaeger_endpoint: "http://jaeger.chimera.svc:14268/api/traces"

  # Logging
  logging:
    level: "info"
    format: "json"
    output: "stdout"

# External service configuration
services:
  # Nemo Claw
  nemoclaw:
    base_url: "${NEMOCLAW_BASE_URL}"
    timeout: 30s
    retry:
      max_attempts: 3
      backoff: 1s
      max_backoff: 10s

  # Redis
  redis:
    url: "${REDIS_URL}"
    pool_size: 10
    max_retries: 3
    dial_timeout: 5s
    read_timeout: 3s
    write_timeout: 3s

  # LLM Provider
  llm:
    provider: "anthropic"
    api_key: "${LLM_API_KEY}"
    model: "claude-sonnet-4-20250514"
    timeout: 30s
    max_retries: 2

# Policy configuration
policies:
  config_path: "/config/policies.yaml"
  reload_interval: 5m
  validation_enabled: true

# Ralph Loop configuration
ralph_loop:
  enabled: true
  max_iterations: 0
  iteration_interval: 5s
  task_queue_size: 1000
  learning_file: "/state/claude-orchestrator/learnings.md"
