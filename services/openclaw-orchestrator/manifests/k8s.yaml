apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-orchestrator-config
  namespace: project-chimera
  labels:
    app: openclaw-orchestrator
    component: service
data:
  SERVICE_NAME: "openclaw-orchestrator"
  PORT: "8000"
  LOG_LEVEL: "INFO"
  ENVIRONMENT: "production"
  KAFKA_BROKERS: "kafka.project-chimera.svc.cluster.local:9092"
  KAFKA_CONSUMER_GROUP: "orchestrator-group"
  REDIS_HOST: "redis.project-chimera.svc.cluster.local"
  REDIS_PORT: "6379"
  MILVUS_HOST: "milvus.project-chimera.svc.cluster.local"
  MILVUS_PORT: "19530"
  SCENE_TIMEOUT: "300"
  MAX_CONCURRENT_SCENES: "3"
  SHOW_START_GRACE_PERIOD: "300"
---
apiVersion: v1
kind: Service
metadata:
  name: openclaw-orchestrator
  namespace: project-chimera
  labels:
    app: openclaw-orchestrator
    component: service
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: openclaw-orchestrator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-orchestrator
  namespace: project-chimera
  labels:
    app: openclaw-orchestrator
    component: service
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: openclaw-orchestrator
  template:
    metadata:
      labels:
        app: openclaw-orchestrator
        component: service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      hostNetwork: false
      hostPID: false
      hostIPC: false
      dnsPolicy: ClusterFirst
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: openclaw-orchestrator
        image: ghcr.io/project-chimera/openclaw-orchestrator:latest
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false
        ports:
        - containerPort: 8000
          protocol: TCP
          name: http
        envFrom:
        - configMapRef:
            name: openclaw-orchestrator-config
        env:
        - name: OTLP_ENDPOINT
          value: "http://opentelemetry-collector.observability.svc.cluster.local:4317"
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health/live
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 18
      volumes:
      - name: tmp
        emptyDir:
          sizeLimit: 2Gi
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - openclaw-orchestrator
              topologyKey: kubernetes.io/hostname
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: openclaw-orchestrator
  namespace: project-chimera
  labels:
    app: openclaw-orchestrator
    component: service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: openclaw-orchestrator
  minReplicas: 2
  maxReplicas: 4
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 1
        periodSeconds: 30
      selectPolicy: Max
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: openclaw-orchestrator
  namespace: project-chimera
  labels:
    app: openclaw-orchestrator
    component: service
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: openclaw-orchestrator
