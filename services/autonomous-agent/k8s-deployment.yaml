apiVersion: apps/v1
kind: Deployment
metadata:
  name: autonomous-agent
  labels:
    app: autonomous-agent
    component: autonomous
spec:
  replicas: 2
  selector:
    matchLabels:
      app: autonomous-agent
  template:
    metadata:
      labels:
        app: autonomous-agent
        component: autonomous
    spec:
      containers:
      - name: autonomous-agent
        image: autonomous-agent:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8008
          name: http
          protocol: TCP
        env:
        - name: SERVICE_NAME
          value: "autonomous-agent"
        - name: PORT
          value: "8008"
        - name: OTLP_ENDPOINT
          value: "http://tempo:4317"
        - name: MAX_RETRIES
          value: "5"
        - name: RETRY_DELAY_SECONDS
          value: "10"
        volumeMounts:
        - name: state
          mountPath: /app/state
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8008
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8008
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: state
        emptyDir: {}
