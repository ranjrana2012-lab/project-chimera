apiVersion: v1
kind: Service
metadata:
  name: autonomous-agent
  labels:
    app: autonomous-agent
    component: autonomous
spec:
  type: ClusterIP
  ports:
  - port: 8008
    targetPort: 8008
    protocol: TCP
    name: http
  selector:
    app: autonomous-agent
---
apiVersion: v1
kind: Service
metadata:
  name: autonomous-agent-metrics
  labels:
    app: autonomous-agent
    component: autonomous
spec:
  type: ClusterIP
  ports:
  - port: 8008
    targetPort: 8008
    protocol: TCP
    name: http-metrics
  selector:
    app: autonomous-agent
