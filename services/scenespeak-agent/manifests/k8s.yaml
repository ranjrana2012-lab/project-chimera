apiVersion: v1
kind: ConfigMap
metadata:
  name: scenespeak-agent-config
  namespace: project-chimera
  labels:
    app: scenespeak-agent
    component: service
data:
  SERVICE_NAME: "scenespeak-agent"
  PORT: "8001"
  LOG_LEVEL: "INFO"
  ENVIRONMENT: "production"
  DEVICE: "cuda"
  DEFAULT_MODEL: "llama-3-8b-instruct"
  MAX_VRAM_MB: "8192"
  MODEL_OFFLOAD: "true"
  MAX_TOKENS: "2048"
  TEMPERATURE: "0.7"
  TOP_P: "0.9"
  TOP_K: "50"
  CONTEXT_LENGTH: "4096"
  TORCH_THREADS: "4"
---
apiVersion: v1
kind: Service
metadata:
  name: scenespeak-agent
  namespace: project-chimera
  labels:
    app: scenespeak-agent
    component: service
spec:
  type: ClusterIP
  ports:
  - port: 8001
    targetPort: 8001
    protocol: TCP
    name: http
  selector:
    app: scenespeak-agent
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: scenespeak-agent-models
  namespace: project-chimera
  labels:
    app: scenespeak-agent
    component: storage
spec:
  accessModes:
  - ReadWriteMany
  resources:
    requests:
      storage: 30Gi
  storageClassName: nfs-sc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scenespeak-agent
  namespace: project-chimera
  labels:
    app: scenespeak-agent
    component: service
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: scenespeak-agent
  template:
    metadata:
      labels:
        app: scenespeak-agent
        component: service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: "/metrics"
    spec:
      hostNetwork: false
      dnsPolicy: ClusterFirst
      containers:
      - name: scenespeak-agent
        image: ghcr.io/project-chimera/scenespeak-agent:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8001
          protocol: TCP
          name: http
        envFrom:
        - configMapRef:
            name: scenespeak-agent-config
        env:
        - name: MODEL_PATH
          value: "/models/llama-3"
        - name: HUGGINGFACE_CACHE_DIR
          value: "/models/cache"
        - name: OTLP_ENDPOINT
          value: "http://opentelemetry-collector.observability.svc.cluster.local:4317"
        resources:
          requests:
            cpu: "2000m"
            memory: "4Gi"
            nvidia.com/gpu: "1"
          limits:
            cpu: "8000m"
            memory: "16Gi"
            nvidia.com/gpu: "1"
        volumeMounts:
        - name: models
          mountPath: /models
        - name: tmp
          mountPath: /tmp
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8001
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health/live
            port: 8001
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30
      volumes:
      - name: models
        persistentVolumeClaim:
          claimName: scenespeak-agent-models
      - name: tmp
        emptyDir:
          sizeLimit: 5Gi
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - NVIDIA_GB10
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - scenespeak-agent
              topologyKey: kubernetes.io/hostname
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: scenespeak-agent
  namespace: project-chimera
  labels:
    app: scenespeak-agent
    component: service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: scenespeak-agent
  minReplicas: 1
  maxReplicas: 2
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 1
        periodSeconds: 30
      selectPolicy: Max
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: scenespeak-agent
  namespace: project-chimera
  labels:
    app: scenespeak-agent
    component: service
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: scenespeak-agent
