apiVersion: v1
kind: ConfigMap
metadata:
  name: simulation-engine-config
data:
  LOG_LEVEL: "INFO"
  PORT: "8016"
  LOCAL_LLM_RATIO: "0.95"
---
apiVersion: v1
kind: Secret
metadata:
  name: simulation-engine-secrets
type: Opaque
stringData:
  GRAPH_DB_PASSWORD: "chimera_graph_2026"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: simulation-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simulation-engine
  template:
    metadata:
      labels:
        app: simulation-engine
    spec:
      containers:
      - name: simulation-engine
        image: simulation-engine:latest
        ports:
        - containerPort: 8016
        env:
        - name: GRAPH_DB_URL
          value: "bolt://neo4j:7687"
        - name: GRAPH_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: simulation-engine-secrets
              key: GRAPH_DB_PASSWORD
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "8Gi"
            cpu: "4000m"
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8016
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8016
---
apiVersion: v1
kind: Service
metadata:
  name: simulation-engine
spec:
  selector:
    app: simulation-engine
  ports:
  - port: 8016
    targetPort: 8016
  type: ClusterIP
