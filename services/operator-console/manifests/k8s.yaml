apiVersion: v1
kind: ConfigMap
metadata:
  name: operator-console-config
  namespace: project-chimera
  labels:
    app: operator-console
    component: service
data:
  SERVICE_NAME: "operator-console"
  PORT: "8007"
  LOG_LEVEL: "INFO"
  ENVIRONMENT: "production"
  ORCHESTRATOR_URL: "http://openclaw-orchestrator.project-chimera.svc.cluster.local:8000"
  GRAFANA_URL: "http://grafana.project-chimera.svc.cluster.local:3000"
  ENABLE_WEBSOCKET: "true"
  WS_HEARTBEAT_INTERVAL: "30"
  MAX_WEBSOCKET_CONNECTIONS: "100"
  SESSION_TIMEOUT: "3600"
  AUTH_ENABLED: "false"
  AUTH_PROVIDER: "local"
---
apiVersion: v1
kind: Service
metadata:
  name: operator-console
  namespace: project-chimera
  labels:
    app: operator-console
    component: service
spec:
  type: ClusterIP
  ports:
  - port: 8007
    targetPort: 8007
    protocol: TCP
    name: http
  selector:
    app: operator-console
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: operator-console
  namespace: project-chimera
  labels:
    app: operator-console
    component: service
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: operator-console
  template:
    metadata:
      labels:
        app: operator-console
        component: service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8007"
        prometheus.io/path: "/metrics"
    spec:
      hostNetwork: false
      hostPID: false
      hostIPC: false
      dnsPolicy: ClusterFirst
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: operator-console
        image: ghcr.io/project-chimera/operator-console:latest
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false
        ports:
        - containerPort: 8007
          protocol: TCP
          name: http
        envFrom:
        - configMapRef:
            name: operator-console-config
        env:
        - name: OTLP_ENDPOINT
          value: "http://opentelemetry-collector.observability.svc.cluster.local:4317"
        resources:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8007
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8007
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health/live
            port: 8007
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 18
      volumes:
      - name: tmp
        emptyDir:
          sizeLimit: 1Gi
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - operator-console
              topologyKey: kubernetes.io/hostname
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: operator-console
  namespace: project-chimera
  labels:
    app: operator-console
    component: service
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: operator-console
