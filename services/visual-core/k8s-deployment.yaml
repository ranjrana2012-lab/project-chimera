---
apiVersion: v1
kind: ConfigMap
metadata:
  name: visual-core-config
  namespace: project-chimera
data:
  LOG_LEVEL: "INFO"
  PORT: "8014"
  LTX_API_BASE: "https://api.ltx.video/v1"
  LTX_MODEL_DEFAULT: "ltx-2-3-pro"
  MAX_CONCURRENT_REQUESTS: "5"
  CACHE_PATH: "/app/cache/videos"
  LORA_STORAGE_PATH: "/app/models/lora"
  OTLP_ENDPOINT: "http://jaeger:4317"
---
apiVersion: v1
kind: Secret
metadata:
  name: visual-core-secrets
  namespace: project-chimera
type: Opaque
stringData:
  LTX_API_KEY: "your-api-key-here"
---
apiVersion: v1
kind: Service
metadata:
  name: visual-core
  namespace: project-chimera
  labels:
    app: visual-core
    service: visual-core
spec:
  type: ClusterIP
  ports:
  - port: 8014
    targetPort: 8014
    protocol: TCP
    name: http
  selector:
    app: visual-core
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: visual-core-storage
  namespace: project-chimera
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
  storageClassName: local-path
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: visual-core
  namespace: project-chimera
  labels:
    app: visual-core
    service: visual-core
spec:
  replicas: 2
  selector:
    matchLabels:
      app: visual-core
  template:
    metadata:
      labels:
        app: visual-core
        service: visual-core
    spec:
      hostNetwork: false
      hostPID: false
      hostIPC: false
      dnsPolicy: ClusterFirst
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: visual-core
        image: visual-core:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8014
          protocol: TCP
        env:
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: visual-core-config
              key: LOG_LEVEL
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: visual-core-config
              key: PORT
        - name: LTX_API_BASE
          valueFrom:
            configMapKeyRef:
              name: visual-core-config
              key: LTX_API_BASE
        - name: LTX_MODEL_DEFAULT
          valueFrom:
            configMapKeyRef:
              name: visual-core-config
              key: LTX_MODEL_DEFAULT
        - name: MAX_CONCURRENT_REQUESTS
          valueFrom:
            configMapKeyRef:
              name: visual-core-config
              key: MAX_CONCURRENT_REQUESTS
        - name: CACHE_PATH
          valueFrom:
            configMapKeyRef:
              name: visual-core-config
              key: CACHE_PATH
        - name: LORA_STORAGE_PATH
          valueFrom:
            configMapKeyRef:
              name: visual-core-config
              key: LORA_STORAGE_PATH
        - name: OTLP_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: visual-core-config
              key: OTLP_ENDPOINT
        - name: LTX_API_KEY
          valueFrom:
            secretKeyRef:
              name: visual-core-secrets
              key: LTX_API_KEY
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
        volumeMounts:
        - name: cache-storage
          mountPath: /app/cache/videos
        - name: lora-storage
          mountPath: /app/models/lora
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8014
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8014
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: cache-storage
        persistentVolumeClaim:
          claimName: visual-core-storage
      - name: lora-storage
        emptyDir: {}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: visual-core-hpa
  namespace: project-chimera
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: visual-core
  minReplicas: 2
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
