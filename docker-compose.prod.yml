version: '3.8'

services:
  # Production overrides for infrastructure services
  redis:
    restart: always
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru --save 900 1 --save 300 10
    deploy:
      resources:
        limits:
          cpus: ${REDIS_CPU_LIMIT:-1.0}
          memory: ${REDIS_MEMORY_LIMIT:-512M}
        reservations:
          cpus: ${REDIS_CPU_RESERVATION:-0.5}
          memory: ${REDIS_MEMORY_RESERVATION:-256M}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  kafka:
    restart: always
    deploy:
      resources:
        limits:
          cpus: ${KAFKA_CPU_LIMIT:-2.0}
          memory: ${KAFKA_MEMORY_LIMIT:-2G}
        reservations:
          cpus: ${KAFKA_CPU_RESERVATION:-1.0}
          memory: ${KAFKA_MEMORY_RESERVATION:-1G}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  zookeeper:
    restart: always
    deploy:
      resources:
        limits:
          cpus: ${ZOOKEEPER_CPU_LIMIT:-1.0}
          memory: ${ZOOKEEPER_MEMORY_LIMIT:-1G}
        reservations:
          cpus: ${ZOOKEEPER_CPU_RESERVATION:-0.5}
          memory: ${ZOOKEEPER_MEMORY_RESERVATION:-512M}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  milvus:
    restart: always
    deploy:
      resources:
        limits:
          cpus: ${MILVUS_CPU_LIMIT:-4.0}
          memory: ${MILVUS_MEMORY_LIMIT:-4G}
        reservations:
          cpus: ${MILVUS_CPU_RESERVATION:-2.0}
          memory: ${MILVUS_MEMORY_RESERVATION:-2G}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  prometheus:
    restart: always
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-30d}'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    deploy:
      resources:
        limits:
          cpus: ${PROMETHEUS_CPU_LIMIT:-2.0}
          memory: ${PROMETHEUS_MEMORY_LIMIT:-2G}
        reservations:
          cpus: ${PROMETHEUS_CPU_RESERVATION:-1.0}
          memory: ${PROMETHEUS_MEMORY_RESERVATION:-1G}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  jaeger:
    restart: always
    deploy:
      resources:
        limits:
          cpus: ${JAEGER_CPU_LIMIT:-2.0}
          memory: ${JAEGER_MEMORY_LIMIT:-2G}
        reservations:
          cpus: ${JAEGER_CPU_RESERVATION:-1.0}
          memory: ${JAEGER_MEMORY_RESERVATION:-1G}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    restart: always
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-chimera}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-https://monitoring.chimera.theatre}
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_LOG_LEVEL=${GRAFANA_LOG_LEVEL:-info}
      - GF_SECURITY_CONTENT_SECURITY_POLICY=true
      - GF_SECURITY_COOKIE_SECURE=true
      - GF_SECURITY_COOKIE_SAMESITE=lax
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          cpus: ${GRAFANA_CPU_LIMIT:-1.0}
          memory: ${GRAFANA_MEMORY_LIMIT:-1G}
        reservations:
          cpus: ${GRAFANA_CPU_RESERVATION:-0.5}
          memory: ${GRAFANA_MEMORY_RESERVATION:-512M}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Production overrides for core services
  openclaw-orchestrator:
    restart: always
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=production
      - RELOAD=false
    deploy:
      mode: replicated
      replicas: ${OPENCLAW_REPLICAS:-1}
      resources:
        limits:
          cpus: ${OPENCLAW_CPU_LIMIT:-2.0}
          memory: ${OPENCLAW_MEMORY_LIMIT:-1G}
        reservations:
          cpus: ${OPENCLAW_CPU_RESERVATION:-0.5}
          memory: ${OPENCLAW_MEMORY_RESERVATION:-256M}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  scenespeak-agent:
    restart: always
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=production
      - RELOAD=false
    deploy:
      mode: replicated
      replicas: ${SCENESPEAK_REPLICAS:-1}
      resources:
        limits:
          cpus: ${SCENESPEAK_CPU_LIMIT:-4.0}
          memory: ${SCENESPEAK_MEMORY_LIMIT:-2G}
        reservations:
          cpus: ${SCENESPEAK_CPU_RESERVATION:-1.0}
          memory: ${SCENESPEAK_MEMORY_RESERVATION:-512M}
          devices:
            - driver: nvidia
              count: ${GPU_COUNT:-1}
              capabilities: [gpu, compute, utility]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  captioning-agent:
    restart: always
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=production
      - RELOAD=false
      - WHISPER_DEVICE=${CAPTIONING_DEVICE:-cuda}
      - WHISPER_COMPUTE_TYPE=${CAPTIONING_COMPUTE_TYPE:-float16}
    deploy:
      mode: replicated
      replicas: ${CAPTIONING_REPLICAS:-1}
      resources:
        limits:
          cpus: ${CAPTIONING_CPU_LIMIT:-4.0}
          memory: ${CAPTIONING_MEMORY_LIMIT:-2G}
        reservations:
          cpus: ${CAPTIONING_CPU_RESERVATION:-1.0}
          memory: ${CAPTIONING_MEMORY_RESERVATION:-512M}
          devices:
            - driver: nvidia
              count: ${GPU_COUNT:-1}
              capabilities: [gpu, compute, utility]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  bsl-agent:
    restart: always
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=production
      - RELOAD=false
    deploy:
      mode: replicated
      replicas: ${BSL_REPLICAS:-1}
      resources:
        limits:
          cpus: ${BSL_CPU_LIMIT:-4.0}
          memory: ${BSL_MEMORY_LIMIT:-2G}
        reservations:
          cpus: ${BSL_CPU_RESERVATION:-1.0}
          memory: ${BSL_MEMORY_RESERVATION:-512M}
          devices:
            - driver: nvidia
              count: ${GPU_COUNT:-1}
              capabilities: [gpu, compute, utility]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  sentiment-agent:
    restart: always
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=production
      - RELOAD=false
    deploy:
      mode: replicated
      replicas: ${SENTIMENT_REPLICAS:-1}
      resources:
        limits:
          cpus: ${SENTIMENT_CPU_LIMIT:-2.0}
          memory: ${SENTIMENT_MEMORY_LIMIT:-1G}
        reservations:
          cpus: ${SENTIMENT_CPU_RESERVATION:-0.5}
          memory: ${SENTIMENT_MEMORY_RESERVATION:-256M}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  lighting-sound-music:
    restart: always
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=production
      - RELOAD=false
    deploy:
      mode: replicated
      replicas: ${LSM_REPLICAS:-1}
      resources:
        limits:
          cpus: ${LSM_CPU_LIMIT:-2.0}
          memory: ${LSM_MEMORY_LIMIT:-1G}
        reservations:
          cpus: ${LSM_CPU_RESERVATION:-0.5}
          memory: ${LSM_MEMORY_RESERVATION:-256M}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  safety-filter:
    restart: always
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=production
      - RELOAD=false
    deploy:
      mode: replicated
      replicas: ${SAFETY_REPLICAS:-2}
      resources:
        limits:
          cpus: ${SAFETY_CPU_LIMIT:-4.0}
          memory: ${SAFETY_MEMORY_LIMIT:-2G}
        reservations:
          cpus: ${SAFETY_CPU_RESERVATION:-1.0}
          memory: ${SAFETY_MEMORY_RESERVATION:-512M}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  operator-console:
    restart: always
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=production
      - RELOAD=false
    deploy:
      mode: replicated
      replicas: ${CONSOLE_REPLICAS:-1}
      resources:
        limits:
          cpus: ${CONSOLE_CPU_LIMIT:-1.0}
          memory: ${CONSOLE_MEMORY_LIMIT:-512M}
        reservations:
          cpus: ${CONSOLE_CPU_RESERVATION:-0.5}
          memory: ${CONSOLE_MEMORY_RESERVATION:-256M}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  music-generation:
    restart: always
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=production
      - RELOAD=false
      - DEVICE=${MUSIC_DEVICE:-cuda}
    deploy:
      mode: replicated
      replicas: ${MUSIC_REPLICAS:-1}
      resources:
        limits:
          cpus: ${MUSIC_CPU_LIMIT:-4.0}
          memory: ${MUSIC_MEMORY_LIMIT:-4G}
        reservations:
          cpus: ${MUSIC_CPU_RESERVATION:-1.0}
          memory: ${MUSIC_MEMORY_RESERVATION:-1G}
          devices:
            - driver: nvidia
              count: ${GPU_COUNT:-1}
              capabilities: [gpu, compute, utility]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
