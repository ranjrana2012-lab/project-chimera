apiVersion: v1
kind: Namespace
metadata:
  name: project-chimera
  labels:
    name: project-chimera
    environment: production
    project: chimera
    component: platform
---
# Resource quota for the entire namespace
apiVersion: v1
kind: ResourceQuota
metadata:
  name: project-chimera-compute-quota
  namespace: project-chimera
  labels:
    app: project-chimera
    component: quota
spec:
  hard:
    requests.cpu: "16"
    requests.memory: "32Gi"
    requests.nvidia.com/gpu: "4"
    limits.cpu: "64"
    limits.memory: "128Gi"
    limits.nvidia.com/gpu: "4"
    persistentvolumeclaims: "20"
    requests.storage: "200Gi"
---
# Limit range to set default resource constraints
apiVersion: v1
kind: LimitRange
metadata:
  name: project-chimera-limit-range
  namespace: project-chimera
  labels:
    app: project-chimera
    component: limits
spec:
  limits:
  - default:
      cpu: "2000m"
      memory: "4Gi"
    defaultRequest:
      cpu: "500m"
      memory: "1Gi"
    type: Container
