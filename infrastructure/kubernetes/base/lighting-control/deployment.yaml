apiVersion: apps/v1
kind: Deployment
metadata:
  name: lighting-control
  namespace: live
  labels:
    app: lighting-control
    project: project-chimera
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lighting-control
  template:
    metadata:
      labels:
        app: lighting-control
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8005"
        prometheus.io/path: "/metrics"
    spec:
      priorityClassName: medium-priority
      containers:
      - name: lighting-control
        image: localhost:30500/project-chimera/lighting-control:latest
        ports:
        - containerPort: 8005
        env:
        - name: DMX_HOST
          value: "192.168.1.100"
        - name: OSC_HOST
          value: "127.0.0.1"
        resources:
          requests:
            cpu: "500m"
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 2Gi
