apiVersion: v1
kind: Namespace
metadata:
  name: live
  labels:
    name: live
    environment: production
    qos: guaranteed
    project: project-chimera
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: live-quota
  namespace: live
spec:
  hard:
    requests.cpu: "32"
    requests.memory: 64Gi
    limits.cpu: "64"
    limits.memory: 128Gi
    persistentvolumeclaims: "10"
    requests.nvidia.com/gpu: "4"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: live-limits
  namespace: live
spec:
  limits:
  - default:
      cpu: "1"
      memory: "1Gi"
    defaultRequest:
      cpu: "100m"
      memory: "128Mi"
    type: Container
