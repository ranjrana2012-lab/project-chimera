apiVersion: v1
kind: Namespace
metadata:
  name: preprod
  labels:
    name: preprod
    environment: pre-production
    qos: burstable
    project: project-chimera
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: preprod-quota
  namespace: preprod
spec:
  hard:
    requests.cpu: "16"
    requests.memory: 32Gi
    limits.cpu: "32"
    limits.memory: 64Gi
    persistentvolumeclaims: "5"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: preprod-limits
  namespace: preprod
spec:
  limits:
  - default:
      cpu: "500m"
      memory: "512Mi"
    defaultRequest:
      cpu: "50m"
      memory: "64Mi"
    type: Container
