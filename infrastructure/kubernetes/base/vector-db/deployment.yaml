apiVersion: apps/v1
kind: Deployment
metadata:
  name: vector-db
  namespace: shared
  labels:
    app: vector-db
    project: project-chimera
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vector-db
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: vector-db
        project: project-chimera
    spec:
      priorityClassName: medium-priority
      initContainers:
      - name: wait-for-etcd
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          until nc -z etcd 2379; do
            echo "Waiting for etcd..."
            sleep 2
          done
      containers:
      - name: milvus
        image: milvusdb/milvus:latest
        ports:
        - containerPort: 19530
          name: grpc
        - containerPort: 9091
          name: metrics
        env:
        - name: ETCD_ENDPOINTS
          value: "etcd:2379"
        - name: MINIO_ADDRESS
          value: "minio:9000"
        - name: COMMON_STORAGEPATH
          value: "/milvus/data"
        resources:
          requests:
            cpu: "1"
            memory: 4Gi
          limits:
            cpu: "2"
            memory: 8Gi
        livenessProbe:
          tcpSocket:
            port: 19530
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 19530
          initialDelaySeconds: 30
          periodSeconds: 5
        volumeMounts:
        - name: vector-db-data
          mountPath: /milvus/data
      volumes:
      - name: vector-db-data
        persistentVolumeClaim:
          claimName: vector-db-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vector-db-pvc
  namespace: shared
spec:
  accessModes:
  - ReadWriteMany
  storageClassName: local-path
  resources:
    requests:
      storage: 20Gi
