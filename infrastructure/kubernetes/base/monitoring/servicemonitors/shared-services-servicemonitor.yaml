apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: chimera-shared-services
  namespace: shared
  labels:
    app: prometheus
    project: project-chimera
spec:
  selector:
    matchLabels:
      project: project-chimera
  namespaceSelector:
    matchNames:
      - shared
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
    relabelings:
    - sourceLabels: [__meta_kubernetes_pod_name]
      targetLabel: pod
    - sourceLabels: [__meta_kubernetes_pod_label_app]
      targetLabel: service
