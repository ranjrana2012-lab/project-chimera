apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: shared
  labels:
    app: grafana
    project: project-chimera
data:
  dashboards.yml: |
    apiVersion: 1

    providers:
    - name: 'Project Chimera'
      orgId: 1
      folder: 'Project Chimera'
      type: file
      disableDeletion: false
      editable: true
      updateIntervalSeconds: 10
      allowUiUpdates: true
      options:
        path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: shared
  labels:
    app: grafana
    project: project-chimera
data:
  datasources.yml: |
    apiVersion: 1

    datasources:
    - name: Prometheus
      type: prometheus
      access: proxy
      url: http://prometheus:9090
      isDefault: true
      editable: true
      jsonData:
        timeInterval: 15s

    - name: Chimera-Live-Services
      type: prometheus
      access: proxy
      url: http://prometheus:9090
      editable: true
      jsonData:
        timeInterval: 15s
        httpMethod: POST
