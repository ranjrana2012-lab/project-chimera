apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: shared
  labels:
    app: jaeger
    project: project-chimera
spec:
  type: ClusterIP
  ports:
  - name: zipkin-thrift
    port: 5775
    protocol: UDP
    targetPort: 5775
  - name: jaeger-compact
    port: 6831
    protocol: UDP
    targetPort: 6831
  - name: jaeger-binary
    port: 6832
    protocol: UDP
    targetPort: 6832
  - name: serve-config
    port: 5778
    protocol: TCP
    targetPort: 5778
  - name: ui
    port: 16686
    protocol: TCP
    targetPort: 16686
  - name: jaeger-http
    port: 14268
    protocol: TCP
    targetPort: 14268
  - name: grpc
    port: 14250
    protocol: TCP
    targetPort: 14250
  - name: zipkin-http
    port: 9411
    protocol: TCP
    targetPort: 9411
  selector:
    app: jaeger
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger-collector
  namespace: shared
  labels:
    app: jaeger
    project: project-chimera
spec:
  type: ClusterIP
  ports:
  - name: jaeger-http
    port: 14268
    protocol: TCP
    targetPort: 14268
  - name: grpc
    port: 14250
    protocol: TCP
    targetPort: 14250
  selector:
    app: jaeger
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger-query
  namespace: shared
  labels:
    app: jaeger
    project: project-chimera
spec:
  type: ClusterIP
  ports:
  - name: ui
    port: 16686
    protocol: TCP
    targetPort: 16686
  selector:
    app: jaeger
