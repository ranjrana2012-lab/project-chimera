# Grafana Secrets Example
# Copy this file to secrets.yaml and fill in the actual values
# DO NOT commit secrets.yaml to version control

apiVersion: v1
kind: Secret
metadata:
  name: grafana-secrets
  namespace: project-chimera
type: Opaque
stringData:
  # Grafana admin password
  # Generate a strong password for production use
  # Example: openssl rand -base64 32
  admin-password: "CHANGE_ME_SECURE_PASSWORD"
