# AlertManager Secrets Example
# Copy this file to secrets.yaml and fill in the actual values
# DO NOT commit secrets.yaml to version control

apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-secrets
  namespace: project-chimera
type: Opaque
stringData:
  # Slack webhook URL for alerts
  # Create at: https://api.slack.com/messaging/webhooks
  # Format: https://hooks.slack.com/services/YOUR/WEBHOOK/URL
  slack-webhook-url: "https://hooks.slack.com/services/YOUR/WEBHOOK/URL"

  # PagerDuty integration (optional)
  # Get from: https://www.pagerduty.com/developer/documentation/v2/prepare-to-use-the-rest-api
  pagerduty-url: "https://events.pagerduty.com/v2/enqueue"
  pagerduty-service-key: "YOUR_PAGERDUTY_INTEGRATION_KEY"

---
# Instructions:
#
# 1. Slack Setup:
#    - Go to https://api.slack.com/apps
#    - Create a new app or use existing one
#    - Enable Incoming Webhooks
#    - Create webhook for desired channels (#chimera-critical, #chimera-alerts)
#    - Copy webhook URL to slack-webhook-url above
#
# 2. PagerDuty Setup (Optional):
#    - Go to https://www.pagerduty.com/developer/documentation/v2/prepare-to-use-the-rest-api
#    - Create a new API key or use existing service integration
#    - Copy integration key to pagerduty-service-key above
#
# 3. After filling in values:
#    - Save as secrets.yaml (not secrets.example.yaml)
#    - Apply to cluster: kubectl apply -f secrets.yaml
#    - The secrets will be mounted into AlertManager pods
#
# 4. Security notes:
#    - Never commit secrets.yaml to git
#    - Use strong, unique passwords
#    - Rotate secrets regularly
#    - Consider using external secret management (Vault, AWS Secrets Manager, etc.)
