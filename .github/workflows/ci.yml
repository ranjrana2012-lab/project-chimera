name: Chimera Core Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6.0.2
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v6.2.0
      with:
        python-version: "3.12"
        cache: 'pip'
        
    - name: Install system dependencies (TTS/Audio)
      run: |
        sudo apt-get update
        sudo apt-get install -y espeak ffmpeg libespeak1
        
    - name: Cache HuggingFace Models
      uses: actions/cache@v5.0.5
      with:
        path: ~/.cache/huggingface
        key: ${{ runner.os }}-huggingface-${{ hashFiles('services/operator-console/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-huggingface-
          
    - name: Install Project Dependencies
      run: |
        cd services/operator-console
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run Test Matrix (Unit, Integration, E2E Smoke)
      run: |
        cd services/operator-console
        # Run exclusively the active monolith demonstrator suite
        PYTHONPATH=.:$PYTHONPATH pytest ../../tests/unit/test_chimera_core.py ../../tests/integration/test_chimera_workflows.py ../../tests/e2e/test_chimera_smoke.py -v
