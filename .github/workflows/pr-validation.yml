name: PR Validation

on:
  pull_request:
    branches: [main]
    paths:
      - 'services/**'
      - 'platform/**'
      - 'tests/**'
  push:
    branches: [feature/*, fix/*]

env:
  PYTHON_VERSION: '3.12'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: project-chimera

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install linting tools
        run: |
          pip install pylint mypy bandit

      - name: Run pylint
        continue-on-error: true
        run: |
          pylint services/ platform/ --exit-zero --output-format=colorized || true

      - name: Run mypy
        continue-on-error: true
        run: |
          mypy services/ platform/ --ignore-missing-imports || true

      - name: Run Bandit security scan
        run: |
          bandit -r services/ platform/ -f json -o bandit-report.json || true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component:
          - platform/orchestrator
          - platform/dashboard
          - platform/cicd-gateway
          - platform/quality-gate
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        working-directory: ${{ matrix.component }}
        run: |
          pip install pytest pytest-cov pytest-asyncio
          pip install -e .

      - name: Run tests
        working-directory: ${{ matrix.component }}
        run: |
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ${{ matrix.component }}/coverage.xml
          flags: ${{ matrix.component }}

  summary:
    name: PR Validation Summary
    runs-on: ubuntu-latest
    needs: [lint, security-scan, unit-tests]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "Lint: ${{ needs.lint.result }}"
          echo "Security: ${{ needs.security-scan.result }}"
          echo "Unit Tests: ${{ needs.unit-tests.result }}"
