name: Monday Onboarding

on:
  workflow_dispatch:
    inputs:
      create_issues:
        description: 'Create Sprint 0 onboarding issues'
        required: true
        default: 'true'

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  create-onboarding-issues:
    runs-on: ubuntu-latest
    if: github.event.inputs.create_issues == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Sprint 0 onboarding issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Role 1: OpenClaw Orchestrator Lead
          gh issue create \
            --title "Sprint 0: OpenClaw Orchestrator Setup" \
            --label "sprint-0,onboarding,role-1" \
            --body "## Onboarding Task: OpenClaw Orchestrator\n\n- [ ] Read Student_Quick_Start.md\n- [ ] Complete environment setup\n- [ ] Access OpenClaw via port-forward (port 8000)\n- [ ] Run health check: \`curl http://localhost:8000/health/live\`\n- [ ] List available skills\n- [ ] Document skill registration flow" || true

          # Role 2: SceneSpeak Agent Lead
          gh issue create \
            --title "Sprint 0: SceneSpeak Agent Setup" \
            --label "sprint-0,onboarding,role-2" \
            --body "## Onboarding Task: SceneSpeak Agent\n\n- [ ] Read Student_Quick_Start.md\n- [ ] Complete environment setup\n- [ ] Access SceneSpeak via port-forward (port 8001)\n- [ ] Test dialogue generation endpoint\n- [ ] Document prompt templates" || true

          # Role 3: Captioning Agent Lead
          gh issue create \
            --title "Sprint 0: Captioning Agent Setup" \
            --label "sprint-0,onboarding,role-3" \
            --body "## Onboarding Task: Captioning Agent\n\n- [ ] Read Student_Quick_Start.md\n- [ ] Complete environment setup\n- [ ] Access Captioning via port-forward (port 8002)\n- [ ] Test transcription endpoint\n- [ ] Review Whisper model configuration" || true

          # Role 4: BSL Translation Lead
          gh issue create \
            --title "Sprint 0: BSL Translation Setup" \
            --label "sprint-0,onboarding,role-4" \
            --body "## Onboarding Task: BSL Translation Agent\n\n- [ ] Read Student_Quick_Start.md\n- [ ] Complete environment setup\n- [ ] Access BSL agent via port-forward (port 8003)\n- [ ] Test translation endpoint\n- [ ] Document gloss translation format" || true

          # Role 5: Sentiment Analysis Lead
          gh issue create \
            --title "Sprint 0: Sentiment Agent Setup" \
            --label "sprint-0,onboarding,role-5" \
            --body "## Onboarding Task: Sentiment Agent\n\n- [ ] Read Student_Quick_Start.md\n- [ ] Complete environment setup\n- [ ] Access Sentiment via port-forward (port 8004)\n- [ ] Test sentiment analysis endpoint\n- [ ] Review sentiment aggregation logic" || true

          # Role 6: Lighting Control Lead
          gh issue create \
            --title "Sprint 0: Lighting Control Setup" \
            --label "sprint-0,onboarding,role-6" \
            --body "## Onboarding Task: Lighting Control\n\n- [ ] Read Student_Quick_Start.md\n- [ ] Complete environment setup\n- [ ] Access Lighting via port-forward (port 8005)\n- [ ] Test lighting set endpoint\n- [ ] Document DMX fixture configuration" || true

          # Role 7: Safety Filter Lead
          gh issue create \
            --title "Sprint 0: Safety Filter Setup" \
            --label "sprint-0,onboarding,role-7" \
            --body "## Onboarding Task: Safety Filter\n\n- [ ] Read Student_Quick_Start.md\n- [ ] Complete environment setup\n- [ ] Access Safety via port-forward (port 8006)\n- [ ] Test safety check endpoint\n- [ ] Review filter rules and policies" || true

          # Role 8: Operator Console Lead
          gh issue create \
            --title "Sprint 0: Operator Console Setup" \
            --label "sprint-0,onboarding,role-8" \
            --body "## Onboarding Task: Operator Console\n\n- [ ] Read Student_Quick_Start.md\n- [ ] Complete environment setup\n- [ ] Access Console via port-forward (port 8007)\n- [ ] Open dashboard UI in browser\n- [ ] Review alert management system" || true

          # Role 9: Infrastructure & DevOps Lead
          gh issue create \
            --title "Sprint 0: Infrastructure Setup" \
            --label "sprint-0,onboarding,role-9" \
            --body "## Onboarding Task: Infrastructure\n\n- [ ] Read Student_Quick_Start.md\n- [ ] Complete environment setup\n- [ ] Verify k3s cluster health: \`kubectl get nodes\`\n- [ ] Access Grafana: http://localhost:3000\n- [ ] Review Prometheus metrics" || true

          # Role 10: QA & Documentation Lead
          gh issue create \
            --title "Sprint 0: QA & Documentation Setup" \
            --label "sprint-0,onboarding,role-10" \
            --body "## Onboarding Task: QA & Documentation\n\n- [ ] Read Student_Quick_Start.md\n- [ ] Complete environment setup\n- [ ] Run full test suite: \`make test\`\n- [ ] Check coverage report\n- [ ] Review documentation structure" || true

          # Floating contributors (11-15)
          for i in 11 12 13 14 15; do
            gh issue create \
              --title "Sprint 0: General Contributor Setup ($i)" \
              --label "sprint-0,onboarding,floating" \
              --body "## Onboarding Task: General Contributor\n\n- [ ] Read Student_Quick_Start.md\n- [ ] Complete environment setup\n- [ ] Explore all 8 services\n- [ ] Choose a component to contribute to\n- [ ] Create first issue for your contribution" || true
          done

      - name: Create project labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Trust labels
          gh label create "trust:new" --color "d73a4a" --description "0 merged PRs - Manual review required" || true
          gh label create "trust:learning" --color "fbca04" --description "1-2 merged PRs - Manual review required" || true
          gh label create "trust:trusted" --color "28a745" --description "3+ merged PRs - Auto-merge eligible" || true

          # Sprint labels
          gh label create "sprint-0" --color "c5def5" --description "Monday onboarding sprint" || true

          # Component labels
          gh label create "component:openclaw" --color "0075ca" --description "Relates to OpenClaw" || true
          gh label create "component:scenespeak" --color "0075ca" --description "Relates to SceneSpeak" || true
          gh label create "component:captioning" --color "0075ca" --description "Relates to Captioning" || true
          gh label create "component:bsl" --color "0075ca" --description "Relates to BSL Translation" || true
          gh label create "component:sentiment" --color "0075ca" --description "Relates to Sentiment" || true
          gh label create "component:lighting" --color "0075ca" --description "Relates to Lighting" || true
          gh label create "component:safety" --color "0075ca" --description "Relates to Safety Filter" || true
          gh label create "component:console" --color "0075ca" --description "Relates to Operator Console" || true
