name: Check Documentation Links

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  pull_request:
    paths:
      - 'docs/**'
      - '*.md'
      - 'scripts/check_markdown_links.py'
  push:
    branches: [ main ]
    paths:
      - 'docs/**'
      - '*.md'
      - 'scripts/check_markdown_links.py'

permissions:
  contents: read

jobs:
  check-links:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check local markdown links
        run: |
          python3 scripts/check_markdown_links.py docs README.md CONTRIBUTING.md SECURITY.md CODE_OF_CONDUCT.md
