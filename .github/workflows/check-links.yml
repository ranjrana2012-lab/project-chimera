name: Check Documentation Links

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  check-links:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Check local markdown links
        run: |
          python3 scripts/check_markdown_links.py docs README.md CONTRIBUTING.md SECURITY.md CODE_OF_CONDUCT.md
