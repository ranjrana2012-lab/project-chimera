name: Tests

on:
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"
  POETRY_VERSION: "1.7.1"

jobs:
  # ============================================
  # Unit Tests
  # ============================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run unit tests
        run: |
          pytest tests/unit \
            -v \
            --tb=short \
            --cov=services \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-report=html \
            -m "not integration and not load"

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unit-tests
          name: codecov-unit-tests
          fail_ci_if_error: false

  # ============================================
  # Integration Tests
  # ============================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      kafka:
        image: bitnami/kafka:3.6
        ports:
          - 9092:9092
          - 9093:9093
        env:
          KAFKA_CFG_NODE_ID: "0"
          KAFKA_CFG_PROCESS_ROLES: "controller,broker"
          KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
          KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
          KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092"
          KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
          KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
          KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
        options: >-
          --health-cmd "kafka-topics.sh --bootstrap-server localhost:9092 --list"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Wait for services to be ready
        run: |
          echo "Waiting for Redis..."
          timeout 30 bash -c 'until nc -z ${{ job.services.redis.ports[6379] }} 6379; do sleep 1; done'
          echo "Waiting for Kafka..."
          timeout 60 bash -c 'until nc -z ${{ job.services.kafka.ports[9092] }} 9092; do sleep 1; done'

      - name: Run integration tests
        env:
          TEST_REDIS_HOST: localhost
          TEST_REDIS_PORT: 6379
          TEST_REDIS_AVAILABLE: "true"
          TEST_KAFKA_SERVERS: localhost:9092
          TEST_KAFKA_AVAILABLE: "true"
        run: |
          pytest tests/integration \
            -v \
            --tb=short \
            -m "integration" \
            --maxfail=5

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            tests/integration/.pytest_cache/
            tests/integration/test-results/

  # ============================================
  # Load Tests
  # ============================================
  load-tests:
    name: Load Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install locust

      - name: Start mock services
        run: |
          # Start a simple mock server for load testing
          python -m http.server 8000 &
          sleep 2

      - name: Run load tests with Locust
        run: |
          locust \
            --headless \
            --users 50 \
            --spawn-rate 10 \
            --run-time 30s \
            --host http://localhost:8000 \
            --html load-test-report.html \
            --csv load-test \
            tests/load/locustfile.py

      - name: Upload load test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-report
          path: |
            load-test-report.html
            load-test_stats.csv
            load-test_stats_history.csv

      - name: Check load test thresholds
        run: |
          # Check if error rate is below threshold
          if grep -q "failure" load-test_stats.csv; then
            FAILURE_RATE=$(awk -F',' 'NR==2 {print $3}' load-test_stats.csv)
            if (( $(echo "$FAILURE_RATE > 5" | bc -l) )); then
              echo "::error::Failure rate too high: $FAILURE_RATE%"
              exit 1
            fi
          fi

  # ============================================
  # Safety / Red Team Tests
  # ============================================
  safety-tests:
    name: Safety & Red Team Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run safety tests
        run: |
          pytest tests/red-team \
            -v \
            --tb=short \
            -m "red_team" \
            --maxfail=3

      - name: Run safety filter tests
        env:
          TEST_REDIS_HOST: localhost
          TEST_REDIS_PORT: 6379
        run: |
          pytest tests/unit/services/safety_filter \
            -v \
            -k "test_block" \
            --tb=short

  # ============================================
  # Accessibility Tests
  # ============================================
  accessibility-tests:
    name: Accessibility Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run accessibility tests
        run: |
          pytest tests/accessibility \
            -v \
            --tb=short \
            -m "accessibility"

  # ============================================
  # Performance Regression Tests
  # ============================================
  performance-tests:
    name: Performance Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install pytest-benchmark

      - name: Run performance tests
        run: |
          pytest tests/load/test_latency.py \
            -v \
            --benchmark-only \
            --benchmark-json=benchmark-results.json

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'pytest'
          output-file-path: benchmark-results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: true
          alert-comment-cc: '@@'

  # ============================================
  # Test Summary
  # ============================================
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, load-tests, safety-tests, accessibility-tests, performance-tests]
    if: always()

    steps:
      - name: Check test results
        run: |
          echo "Unit Tests: ${{ needs.unit-tests.result }}"
          echo "Integration Tests: ${{ needs.integration-tests.result }}"
          echo "Load Tests: ${{ needs.load-tests.result }}"
          echo "Safety Tests: ${{ needs.safety-tests.result }}"
          echo "Accessibility Tests: ${{ needs.accessibility-tests.result }}"
          echo "Performance Tests: ${{ needs.performance-tests.result }}"

          if [ "${{ needs.unit-tests.result }}" != "success" ]; then
            echo "::error::Unit tests failed"
            exit 1
          fi

          if [ "${{ needs.integration-tests.result }}" != "success" ]; then
            echo "::error::Integration tests failed"
            exit 1
          fi

          echo "All critical tests passed!"
