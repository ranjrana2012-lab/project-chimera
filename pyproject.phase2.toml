[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "project-chimera-phase2"
version = "2.0.0"
description = "Project Chimera Phase 2 - Hardware Integration Services"
readme = "README.md"
requires-python = ">=3.12"
license = {text = "MIT"}
authors = [
    {name = "Project Chimera Team", email = "contact@projectchimera.org"}
]
keywords = [
    "theatre",
    "ai",
    "adaptive",
    "dmx",
    "audio",
    "bsl",
    "sign-language",
    "live-performance"
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Multimedia :: Sound/Audio",
    "Topic :: System :: Hardware"
]

dependencies = [
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
    "python-dotenv>=1.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.21.0",
    "pytest-cov>=4.1.0",
    "black>=23.0.0",
    "ruff>=0.1.0",
    "mypy>=1.5.0",
    "pre-commit>=3.3.0",
]

dmx = [
    "dmx485>=0.1.0",  # DMX512 communication
]

audio = [
    "sounddevice>=0.4.6",  # Audio playback
    "pyaudio>=0.2.13",  # Alternative audio backend
]

bsl = [
    "mediapipe>=0.10.0",  # Hand tracking for avatar
    "opencv-python>=4.8.0",  # Image processing
    "numpy>=1.24.0",  # Numerical operations
]

all = [
    "project-chimera-phase2[dev,dmx,audio,bsl]",
]

[project.urls]
Homepage = "https://github.com/ranjrana2012-lab/project-chimera"
Documentation = "https://github.com/ranjrana2012-lab/project-chimera/docs"
Repository = "https://github.com/ranjrana2012-lab/project-chimera.git"
Issues = "https://github.com/ranjrana2012-lab/project-chimera/issues"

[tool.setuptools.packages.find]
where = ["services"]
include = ["dmx-controller*", "audio-controller*", "bsl-avatar-service*"]

[tool.black]
line-length = 100
target-version = ['py312']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.venv
  | \.eggs
  | \.tox
  | build
  | dist
  | __pycache__
)/
'''

[tool.ruff]
line-length = 100
target-version = "py312"
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long (handled by black)
    "B008",  # do not perform function calls in argument defaults
]
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    "build",
    "dist",
]

[tool.ruff.per-file-ignores]
"__init__.py" = ["F401"]  # Unused imports in __init__.py

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false  # Gradually enable this
disallow_incomplete_defs = false  # Gradually enable this
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
strict_equality = true

[[tool.mypy.overrides]]
module = [
    "dmx485.*",
    "sounddevice.*",
    "pyaudio.*",
    "mediapipe.*",
    "cv2.*",
]
ignore_missing_imports = true

[tool.pytest.ini_options]
minversion = "7.0"
testpaths = [
    "services/dmx-controller/tests",
    "services/audio-controller/tests",
    "services/bsl-avatar-service/tests",
]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "-v",
    "--strict-markers",
    "--tb=short",
    "--cov=services",
    "--cov-report=term-missing",
    "--cov-report=html",
    "--cov-fail-under=80",
]
markers = [
    "unit: Unit tests",
    "integration: Integration tests",
    "slow: Slow running tests",
]
asyncio_mode = "auto"

[tool.coverage.run]
source = ["services"]
omit = [
    "*/tests/*",
    "*/test_*.py",
    "*/__pycache__/*",
    "*/site-packages/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "@abstractmethod",
]
