version: '3.8'

services:
  # Jaeger Collector - Distributed tracing backend
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: chimera-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
    ports:
      - "5775:5775/udp"       # Accept zipkin.thrift over compact thrift
      - "6831:6831/udp"       # Accept jaeger.thrift over compact thrift
      - "6832:6832"           # Accept jaeger.thrift over binary thrift
      - "9411:9411"           # Collector
      - "16686:16686"         # Jaeger UI
      - "14250:14250"         # HTTP model access
      - "14268:14268"         # Jaeger internal HTTP
      - "14269:14269"         # Jaeger internal gRPC
    restart: unless-stopped
    networks:
      - chimera-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  chimera-network:
    external: true
    name: chimera-network
