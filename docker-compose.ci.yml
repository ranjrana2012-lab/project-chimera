# Docker Compose override for CI/CD environments
# - Disable GPU requests by setting GPU_COUNT=0
# - CPU-only mode
# - Auto-restart disabled for faster testing

services:
  # Infrastructure services - minimal config for CI
  redis:
    restart: "no"

  kafka:
    restart: "no"

  zookeeper:
    restart: "no"

  milvus:
    restart: "no"

  prometheus:
    restart: "no"

  jaeger:
    restart: "no"

  grafana:
    restart: "no"

  # Core services - CPU mode for CI
  openclaw-orchestrator:
    restart: "no"
    environment:
      - LOG_LEVEL=INFO
      - ENVIRONMENT=ci
      - RELOAD=false

  scenespeak-agent:
    restart: "no"
    environment:
      - LOG_LEVEL=INFO
      - ENVIRONMENT=ci
      - RELOAD=false
      - DEVICE=cpu
      - GPU_COUNT=0  # Disable GPU requests

  captioning-agent:
    restart: "no"
    environment:
      - LOG_LEVEL=INFO
      - ENVIRONMENT=ci
      - RELOAD=false
      - WHISPER_DEVICE=cpu
      - WHISPER_COMPUTE_TYPE=int8
      - GPU_COUNT=0  # Disable GPU requests

  bsl-agent:
    restart: "no"
    environment:
      - LOG_LEVEL=INFO
      - ENVIRONMENT=ci
      - RELOAD=false
      - GPU_COUNT=0  # Disable GPU requests

  sentiment-agent:
    restart: "no"
    environment:
      - LOG_LEVEL=INFO
      - ENVIRONMENT=ci
      - RELOAD=false

  lighting-sound-music:
    restart: "no"
    environment:
      - LOG_LEVEL=INFO
      - ENVIRONMENT=ci
      - RELOAD=false

  safety-filter:
    restart: "no"
    environment:
      - LOG_LEVEL=INFO
      - ENVIRONMENT=ci
      - RELOAD=false

  operator-console:
    restart: "no"
    environment:
      - LOG_LEVEL=INFO
      - ENVIRONMENT=ci
      - RELOAD=false

  music-generation:
    restart: "no"
    environment:
      - LOG_LEVEL=INFO
      - ENVIRONMENT=ci
      - RELOAD=false
      - DEVICE=cpu
      - GPU_COUNT=0  # Disable GPU requests
