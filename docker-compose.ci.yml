# Docker Compose override for CI/CD environments
# - Remove all deploy configurations (which contain GPU requests)
# - CPU-only mode
# - Auto-restart disabled for faster testing

services:
  # Infrastructure services - minimal config for CI
  redis:
    restart: "no"
    deploy: null  # Remove deploy config

  kafka:
    restart: "no"
    deploy: null

  zookeeper:
    restart: "no"
    deploy: null

  milvus:
    restart: "no"
    deploy: null

  prometheus:
    restart: "no"
    deploy: null

  jaeger:
    restart: "no"
    deploy: null

  grafana:
    restart: "no"
    deploy: null

  # Core services - CPU mode for CI
  openclaw-orchestrator:
    restart: "no"
    environment:
      - LOG_LEVEL=INFO
      - ENVIRONMENT=ci
      - RELOAD=false
    deploy: null  # Remove deploy config (removes GPU requests)

  scenespeak-agent:
    restart: "no"
    environment:
      - LOG_LEVEL=INFO
      - ENVIRONMENT=ci
      - RELOAD=false
      - DEVICE=cpu
    deploy: null

  captioning-agent:
    restart: "no"
    environment:
      - LOG_LEVEL=INFO
      - ENVIRONMENT=ci
      - RELOAD=false
      - WHISPER_DEVICE=cpu
      - WHISPER_COMPUTE_TYPE=int8
    deploy: null

  bsl-agent:
    restart: "no"
    environment:
      - LOG_LEVEL=INFO
      - ENVIRONMENT=ci
      - RELOAD=false
    deploy: null

  sentiment-agent:
    restart: "no"
    environment:
      - LOG_LEVEL=INFO
      - ENVIRONMENT=ci
      - RELOAD=false
    deploy: null

  lighting-sound-music:
    restart: "no"
    environment:
      - LOG_LEVEL=INFO
      - ENVIRONMENT=ci
      - RELOAD=false
    deploy: null

  safety-filter:
    restart: "no"
    environment:
      - LOG_LEVEL=INFO
      - ENVIRONMENT=ci
      - RELOAD=false
    deploy: null

  operator-console:
    restart: "no"
    environment:
      - LOG_LEVEL=INFO
      - ENVIRONMENT=ci
      - RELOAD=false
    deploy: null

  music-generation:
    restart: "no"
    environment:
      - LOG_LEVEL=INFO
      - ENVIRONMENT=ci
      - RELOAD=false
      - DEVICE=cpu
    deploy: null
