# Docker Compose override for CI/CD environments
# - Completely replace deploy configuration to remove GPU requests
# - CPU-only mode
# - Auto-restart disabled for faster testing

services:
  # Infrastructure services - minimal config for CI
  redis:
    restart: "no"

  kafka:
    restart: "no"

  zookeeper:
    restart: "no"

  milvus:
    restart: "no"

  prometheus:
    restart: "no"

  jaeger:
    restart: "no"

  grafana:
    restart: "no"

  # Core services - CPU mode for CI
  # Explicitly replace deploy configuration to remove GPU devices
  openclaw-orchestrator:
    restart: "no"
    environment:
      - LOG_LEVEL=INFO
      - ENVIRONMENT=ci
      - RELOAD=false
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "512M"
        reservations:
          cpus: "0.5"
          memory: "256M"

  scenespeak-agent:
    restart: "no"
    environment:
      - LOG_LEVEL=INFO
      - ENVIRONMENT=ci
      - RELOAD=false
      - DEVICE=cpu
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: "1G"
        reservations:
          cpus: "0.5"
          memory: "256M"

  captioning-agent:
    restart: "no"
    environment:
      - LOG_LEVEL=INFO
      - ENVIRONMENT=ci
      - RELOAD=false
      - WHISPER_DEVICE=cpu
      - WHISPER_COMPUTE_TYPE=int8
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: "1G"
        reservations:
          cpus: "0.5"
          memory: "256M"

  bsl-agent:
