services:
  chimera-student-dashboard:
    build: 
      context: ./services/operator-console
      dockerfile: Dockerfile.student
    container_name: chimera_student_sandbox
    ports:
      - "${CHIMERA_STUDENT_PORT:-8080}:8080"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./services/operator-console:/app
      - /app/venv/
    restart: unless-stopped
