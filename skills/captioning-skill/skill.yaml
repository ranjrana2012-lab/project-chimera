apiVersion: openclaw.io/v1
kind: Skill
metadata:
  name: captioning
  version: 1.0.0
spec:
  description: "Converts audio to text captions with accessibility descriptions"

  inputs:
    - name: audio_data
      type: string
      required: true
      description: "Base64-encoded audio data"

    - name: language
      type: string
      required: false
      description: "Language code (defaults to 'en')"

  outputs:
    - name: text
      type: string
      description: "Transcribed text"

    - name: language
      type: string
      description: "Detected or specified language"

    - name: confidence
      type: float
      description: "Transcription confidence score"

    - name: timestamp
      type: string
      description: "ISO 8601 timestamp of transcription"

  config:
    timeout: 1500ms
    retryPolicy:
      maxRetries: 1
      backoff: fixed

    model:
      name: "whisper"
      size: "base"

    caching:
      enabled: false

  tags:
    - captioning
    - accessibility
    - speech-to-text
